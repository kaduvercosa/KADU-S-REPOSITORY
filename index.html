<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MasterDex</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* SISTEMA DE TEMAS */
    :root {
      --type-color: #1a1a2e;
      --type-dark: #0f0f1a;
      --glass-bg: rgba(255, 255, 255, 0.45);
      --glass-border: rgba(255, 255, 255, 0.6);
      --text-main: #1a1a1a;
      --header-bg: rgba(255, 255, 255, 0.15);
      --card-inner: rgba(255, 255, 255, 0.3);
    }

    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        --glass-bg: rgba(20, 20, 30, 0.6);
        --glass-border: rgba(255, 255, 255, 0.15);
        --text-main: #ffffff;
        --header-bg: rgba(0, 0, 0, 0.3);
        --card-inner: rgba(255, 255, 255, 0.1);
      }
    }

    [data-theme="dark"] {
        --glass-bg: rgba(20, 20, 30, 0.6);
        --glass-border: rgba(255, 255, 255, 0.15);
        --text-main: #ffffff;
        --header-bg: rgba(0, 0, 0, 0.3);
        --card-inner: rgba(255, 255, 255, 0.1);
    }

    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
    
    body { 
      margin: 0; padding: 0; 
      background: linear-gradient(135deg, var(--type-color) 0%, var(--type-dark) 100%); 
      background-attachment: fixed; 
      color: var(--text-main); 
      font-family: 'Poppins', sans-serif; 
      min-height: 100vh; transition: background 0.8s ease, color 0.3s ease; 
    }

    #theme-toggle { 
      position: fixed; bottom: 30px; right: 30px; width: 55px; height: 55px; border-radius: 50%; 
      background: var(--glass-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
      border: 1px solid var(--glass-border); color: var(--text-main); 
      font-size: 20px; cursor: pointer; z-index: 2000; display: flex; justify-content: center; align-items: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2); transition: 0.3s;
    }

    header { 
      width: 100%; padding: 35px 20px; text-align: center; box-sizing: border-box; 
      background: var(--header-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
      border-bottom: 1px solid var(--glass-border); z-index: 100; position: fixed; top: 0; transition: 0.4s ease;
    }
    header.hide { transform: translateY(-100%); }
    
    h1 { font-family: 'Montserrat', sans-serif; font-size: 32px; font-weight: 900; letter-spacing: 3px; margin: 0 0 15px 0; color: #fff; text-shadow: 0 4px 15px rgba(0,0,0,0.2); }
    #search-input { width: 90%; max-width: 600px; padding: 18px 25px; border-radius: 25px; border: 1px solid var(--glass-border); background: var(--glass-bg); color: var(--text-main); font-size: 16px; outline: none; }

    #pokedex-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; width: 92%; max-width: 1200px; margin: 0 auto; padding: 190px 0 50px 0; }
    .grid-card { background: var(--glass-bg); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid var(--glass-border); border-radius: 25px; padding: 25px 15px; text-align: center; cursor: pointer; transition: 0.2s; box-shadow: 0 8px 32px rgba(0,0,0,0.1); }
    .grid-card:hover { transform: translateY(-8px); }
    .grid-card img { width: 100px; height: 100px; object-fit: contain; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.2)); }
    .grid-name { font-family: 'Montserrat', sans-serif; font-size: 15px; font-weight: 800; text-transform: capitalize; margin-top: 10px; }

    #modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); z-index: 1000; display: none; justify-content: center; align-items: flex-start; overflow-y: auto; padding: 20px; box-sizing: border-box; }
    #modal-overlay.active { display: flex; }
    #modal-content { background: var(--glass-bg); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); border: 1px solid var(--glass-border); border-radius: 40px; padding: 40px; width: 100%; max-width: 850px; margin: auto; position: relative; box-shadow: 0 30px 60px rgba(0,0,0,0.25); }

    .close-btn { position: absolute; top: 20px; right: 20px; width: 45px; height: 45px; border-radius: 50%; background: var(--card-inner); border: 1px solid var(--glass-border); color: var(--text-main); font-size: 22px; font-weight: bold; cursor: pointer; }

    .modal-layout { display: flex; flex-direction: column; align-items: center; gap: 25px; width: 100%; }
    #poke-image { width: 240px; height: 240px; object-fit: contain; animation: float 4s ease-in-out infinite; }
    #poke-name { font-family: 'Montserrat', sans-serif; font-size: 40px; font-weight: 900; text-transform: capitalize; text-align: center; }
    #poke-desc { font-style: italic; background: var(--card-inner); padding: 25px; border-radius: 20px; border-left: 6px solid var(--type-color); line-height: 1.6; width: 100%; box-sizing: border-box; }

    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; margin: 10px 0; }
    .info-item { display: flex; flex-direction: row; align-items: baseline; gap: 10px; flex-wrap: wrap; background: var(--card-inner); padding: 15px 20px; border-radius: 20px; border: 1px solid var(--glass-border); }
    .info-label { font-size: 11px; font-weight: 800; opacity: 0.5; text-transform: uppercase; }
    .info-value { font-size: 16px; font-weight: 800; }

    #poke-stats { width: 100%; background: var(--card-inner); padding: 30px; border-radius: 30px; box-sizing: border-box; }
    .stat-row { display: flex; align-items: center; margin-bottom: 12px; }
    .stat-name { width: 90px; font-size: 10px; font-weight: 900; opacity: 0.5; text-transform: uppercase; }
    .stat-bar-bg { flex: 1; background: rgba(0,0,0,0.1); height: 10px; border-radius: 5px; margin: 0 15px; overflow: hidden; }
    .stat-bar-fill { height: 100%; background-color: var(--type-color); width: 0; transition: width 1s ease-out; }
    .stat-value { width: 35px; font-weight: 800; text-align: right; }

    /* CORREÇÃO DO BUG DAS EVOLUÇÕES NO HOVER */
    .evo-container { display: flex; justify-content: center; flex-wrap: wrap; gap: 20px; width: 100%; margin-top: 20px; }
    .evo-card { 
      background: var(--card-inner); border: 1px solid var(--glass-border); 
      padding: 15px; border-radius: 22px; text-align: center; width: 110px; 
      cursor: pointer; transition: transform 0.2s ease, border-color 0.2s ease; 
    }
    .evo-card:hover { 
      transform: scale(1.08); 
      border-color: var(--type-color);
      background: rgba(150,150,150,0.15);
    }
    .evo-card img { width: 80px; height: 80px; filter: drop-shadow(0 5px 8px rgba(0,0,0,0.1)); }
    .evo-name { font-size: 11px; font-weight: 800; text-transform: capitalize; margin-top: 10px; }

    .loader { border: 4px solid rgba(150,150,150,0.1); border-top: 4px solid var(--text-main); border-radius: 50%; width: 45px; height: 45px; animation: spin 1s linear infinite; margin: 100px auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    @media (min-width: 800px) {
      .modal-layout { flex-direction: row; align-items: flex-start; gap: 45px; }
      #poke-image { width: 300px; height: 300px; align-self: center; }
      .info-grid { grid-template-columns: 1fr 1fr 1fr; }
      .info-item { flex-direction: column; gap: 5px; }
      #pokedex-grid { padding-top: 200px; }
    }
  </style>
</head>
<body>

  <button id="theme-toggle" onclick="toggleTheme()">🌓</button>

  <header id="main-header">
    <h1>MASTERDEX</h1>
    <input type="text" id="search-input" placeholder="Buscar Pokémon...">
  </header>

  <div id="pokedex-grid"></div>
  <div class="loader" id="main-loader"></div>

  <div id="modal-overlay" onclick="if(event.target.id==='modal-overlay') forceCloseModal()">
    <div id="modal-content">
      <button class="close-btn" onclick="forceCloseModal()">×</button>
      <div id="modal-loader" class="loader" style="display:none"></div>
      <div class="modal-layout" id="modal-details">
        <div style="text-align:center">
          <img id="poke-image" src="">
          <div id="poke-id" style="font-weight:900; opacity:0.5; letter-spacing:2px"></div>
        </div>
        <div style="flex:1; width:100%">
          <div id="poke-name"></div>
          <div id="poke-types" style="display:flex; justify-content:center; gap:12px; margin:20px 0"></div>
          <div id="poke-desc"></div>
          
          <div class="info-grid">
            <div class="info-item"><span class="info-label">Altura</span><span class="info-value" id="poke-height"></span></div>
            <div class="info-item"><span class="info-label">Peso</span><span class="info-value" id="poke-weight"></span></div>
            <div class="info-item"><span class="info-label">Raridade</span><span class="info-value" id="poke-rarity"></span></div>
          </div>
          
          <div id="poke-stats"></div>
          <div id="evolutions"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    function toggleTheme() {
      const html = document.documentElement;
      const target = html.getAttribute("data-theme") === "dark" ? "light" : "dark";
      html.setAttribute("data-theme", target);
      localStorage.setItem("pokedex-theme", target);
    }
    if(localStorage.getItem("pokedex-theme")) document.documentElement.setAttribute("data-theme", localStorage.getItem("pokedex-theme"));

    let lastScroll = 0;
    window.addEventListener("scroll", () => {
      const top = window.pageYOffset || document.documentElement.scrollTop;
      document.getElementById("main-header").classList.toggle("hide", top > lastScroll && top > 150);
      lastScroll = top <= 0 ? 0 : top;
    });

    const typeColors = { normal: '#9FA19F', fire: '#F45C19', water: '#3A8DE9', electric: '#F2D335', grass: '#53BA4E', ice: '#6CD4D0', fighting: '#CE426B', poison: '#AA6BC8', ground: '#D97944', flying: '#91A8E1', psychic: '#FB8886', bug: '#90C12B', rock: '#C6B78B', ghost: '#5269AD', dragon: '#0B6DC4', dark: '#5A5465', steel: '#5A8FA3', fairy: '#EC8FE6' };
    
    // DICIONÁRIO DE TRADUÇÃO DE ATRIBUTOS
    const statMap = { hp: 'HP', attack: 'ATAQUE', defense: 'DEFESA', 'special-attack': 'ATQ. ESP', 'special-defense': 'DEF. ESP', speed: 'VELOCIDADE' };

    let allPokemon = [];

    async function init() {
      const res = await fetch('https://pokeapi.co/api/v2/pokemon?limit=1025');
      const data = await res.json();
      allPokemon = data.results;
      renderGrid(allPokemon);
      document.getElementById('main-loader').style.display='none';
      openModal(Math.floor(Math.random() * 151) + 1, true);
    }

    function renderGrid(list) {
      const grid = document.getElementById('pokedex-grid'); grid.innerHTML = '';
      list.forEach(p => {
        const id = p.url.split('/').filter(Boolean).pop();
        const card = document.createElement('div'); card.className = 'grid-card';
        card.onclick = () => openModal(id);
        card.innerHTML = `<img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${id}.png" loading="lazy">
                          <div class="grid-name">${p.name.replace(/-/g, ' ')}</div>`;
        grid.appendChild(card);
      });
    }

    document.getElementById('search-input').oninput = (e) => {
      const t = e.target.value.toLowerCase();
      renderGrid(allPokemon.filter(p => p.name.includes(t) || p.url.includes('/' + t + '/')));
    };

    async function openModal(id, silent = false) {
      if(!silent) {
        document.getElementById('modal-overlay').classList.add('active');
        document.getElementById('modal-details').style.opacity = '0';
        document.body.style.overflow = 'hidden';
      }
      const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`);
      const data = await res.json();
      const color = typeColors[data.types[0].type.name];
      document.documentElement.style.setProperty('--type-color', color);
      document.documentElement.style.setProperty('--type-dark', color + '22');

      if(silent) return;

      document.getElementById('poke-image').src = data.sprites.other['official-artwork'].front_default;
      document.getElementById('poke-name').innerText = data.name.replace(/-/g, ' ');
      document.getElementById('poke-id-modal').innerText = '#' + id.toString().padStart(3, '0');
      document.getElementById('poke-height').innerText = (data.height/10).toFixed(1) + ' m';
      document.getElementById('poke-weight').innerText = (data.weight/10).toFixed(1) + ' kg';

      const typesDiv = document.getElementById('poke-types'); typesDiv.innerHTML = '';
      data.types.forEach(t => {
        typesDiv.innerHTML += `<span style="background:${typeColors[t.type.name]}; color:#fff; padding:8px 22px; border-radius:20px; font-weight:900; font-size:12px; text-transform:uppercase; box-shadow: 0 4px 10px rgba(0,0,0,0.2)">${t.type.name}</span>`;
      });

      // RENDERIZAÇÃO DOS ATRIBUTOS TRADUZIDOS
      const statsDiv = document.getElementById('poke-stats'); statsDiv.innerHTML = '<h3 style="text-align:center; font-size:14px; margin-bottom:20px; opacity:0.6">ATRIBUTOS BASE</h3>';
      data.stats.forEach(s => {
        const pct = Math.min((s.base_stat / 200) * 100, 100);
        statsDiv.innerHTML += `<div class="stat-row"><span class="stat-name">${statMap[s.stat.name] || s.stat.name}</span><div class="stat-bar-bg"><div class="stat-bar-fill" style="width:${pct}%"></div></div><span class="stat-value">${s.base_stat}</span></div>`;
      });

      const spec = await (await fetch(data.species.url)).json();
      const flavor = spec.flavor_text_entries.find(f => f.language.name === 'pt-BR' || f.language.name === 'pt') || spec.flavor_text_entries.find(f => f.language.name === 'en');
      let synopsis = flavor ? flavor.flavor_text.replace(/[\f\n\r]/g, ' ') : "...";
      
      if (flavor && flavor.language.name !== 'pt' && flavor.language.name !== 'pt-BR') {
        try {
          const tr = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=pt&dt=t&q=${encodeURIComponent(synopsis)}`);
          const trd = await tr.json(); synopsis = trd[0].map(x => x[0]).join('');
        } catch(e) {}
      }
      document.getElementById('poke-desc').innerText = `"${synopsis}"`;
      document.getElementById('poke-rarity').innerText = spec.is_legendary ? 'Lendário' : (spec.is_mythical ? 'Mítico' : 'Comum');

      fetchEvolutions(spec.evolution_chain.url);
      document.getElementById('modal-details').style.opacity = '1';
      document.getElementById('modal-overlay').scrollTop = 0;
    }

    async function fetchEvolutions(url) {
      const d = await (await fetch(url)).json(); let evos = [];
      function getE(n) { evos.push({ name: n.species.name, id: n.species.url.split('/').filter(Boolean).pop() }); n.evolves_to.forEach(getE); }
      getE(d.chain);
      const div = document.getElementById('evolutions'); div.innerHTML = evos.length > 1 ? '<h3 style="text-align:center; font-size:12px; opacity:0.5; margin-top:30px">CADEIA DE EVOLUÇÃO</h3><div class="evo-container"></div>' : '';
      if(evos.length > 1) {
        const container = div.querySelector('.evo-container');
        evos.forEach(e => {
          const c = document.createElement('div'); c.className = 'evo-card'; 
          c.onclick = (event) => { event.stopPropagation(); openModal(e.id); };
          c.innerHTML = `<img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${e.id}.png"><div class="evo-name">${e.name}</div>`;
          container.appendChild(c);
        });
      }
    }

    function forceCloseModal() { document.getElementById('modal-overlay').classList.remove('active'); document.body.style.overflow = 'auto'; }
    init();
  </script>
</body>
</html>

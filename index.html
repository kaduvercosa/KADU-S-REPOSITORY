<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokedex Pro - Ultimate Eduardo</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;700&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        kanit: ['Kanit', 'sans-serif'],
                        montserrat: ['Montserrat', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #020617; color: white; font-family: 'Montserrat', sans-serif; }
        
        /* Grid Otimizado */
        .pokedex-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 16px;
        }
        @media (min-width: 1024px) {
            .pokedex-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 24px; }
        }

        .pokemon-card { 
            background: #0f172a;
            border: 1px solid #1e293b;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .pokemon-card:hover {
            transform: translateY(-8px);
            border-color: #facc15;
            box-shadow: 0 15px 30px -10px rgba(250, 204, 21, 0.2);
        }

        .modal-overlay { backdrop-filter: blur(20px); background: rgba(0,0,0,0.85); z-index: 100; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .stat-bar { height: 6px; background: #1e293b; border-radius: 3px; overflow: hidden; }
        .stat-fill { height: 100%; transition: width 1s ease-out; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const TRANSLATIONS = {
            types: {
                fire: 'Fogo', water: 'Agua', grass: 'Planta', bug: 'Inseto', normal: 'Normal', 
                poison: 'Venenoso', electric: 'Eletrico', ground: 'Terra', fairy: 'Fada', 
                fighting: 'Lutador', psychic: 'Psiquico', rock: 'Pedra', ghost: 'Fantasma', 
                ice: 'Gelo', dragon: 'Dragao', steel: 'Aco', flying: 'Voador', dark: 'Sombrio'
            },
            stats: {
                hp: 'Vida', attack: 'Atk', defense: 'Def', 
                'special-attack': 'Atk.Esp', 'special-defense': 'Def.Esp', speed: 'Veloc'
            }
        };

        const COLORS = {
            fire: 'bg-red-500', water: 'bg-blue-500', grass: 'bg-green-500', 
            bug: 'bg-lime-600', normal: 'bg-slate-400', poison: 'bg-purple-500', 
            electric: 'bg-yellow-400', ground: 'bg-amber-600', fairy: 'bg-pink-400', 
            fighting: 'bg-orange-700', psychic: 'bg-rose-400', rock: 'bg-stone-600', 
            ghost: 'bg-indigo-800', ice: 'bg-cyan-300', dragon: 'bg-violet-600',
            steel: 'bg-gray-500', flying: 'bg-sky-400', dark: 'bg-gray-800'
        };

        function App() {
            const [pokemonList, setPokemonList] = useState([]);
            const [loading, setLoading] = useState(true);
            const [search, setSearch] = useState('');
            const [typeFilter, setTypeFilter] = useState('todos');
            const [selected, setSelected] = useState(null);
            const [evoChain, setEvoChain] = useState([]);

            useEffect(() => {
                const init = async () => {
                    const res = await fetch('https://pokeapi.co/api/v2/pokemon?limit=1025');
                    const data = await res.json();
                    const list = data.results.map((p, i) => ({
                        name: p.name,
                        id: i + 1,
                        img: `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${i + 1}.png`
                    }));
                    setPokemonList(list);
                    setLoading(false);
                    loadTypes(list);
                };
                init();
            }, []);

            const loadTypes = async (list) => {
                for (let i = 0; i < list.length; i += 40) {
                    const batch = list.slice(i, i + 40);
                    const details = await Promise.all(batch.map(async p => {
                        const r = await fetch(p.url);
                        const d = await r.json();
                        return { ...p, types: d.types.map(t => t.type.name) };
                    }));
                    setPokemonList(prev => {
                        const copy = [...prev];
                        details.forEach(d => { copy[d.id - 1] = d; });
                        return copy;
                    });
                }
            };

            const loadDetails = async (idOrName) => {
                try {
                    const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${idOrName}`);
                    const data = await res.json();
                    const sRes = await fetch(data.species.url);
                    const sData = await sRes.json();
                    const eRes = await fetch(sData.evolution_chain.url);
                    const eData = await eRes.json();

                    let chain = [];
                    let curr = eData.chain;

                    while (curr) {
                        const name = curr.species.name;
                        const spRes = await fetch(`https://pokeapi.co/api/v2/pokemon-species/${name}`);
                        const spData = await spRes.json();
                        
                        const variants = await Promise.all(spData.varieties.map(async v => {
                            const vR = await fetch(v.pokemon.url);
                            const vD = await vR.json();
                            return {
                                name: v.pokemon.name,
                                id: vD.id,
                                isDefault: v.is_default,
                                img: vD.sprites.other['official-artwork'].front_default || vD.sprites.front_default
                            };
                        }));

                        chain.push({ name, variants });
                        curr = curr.evolves_to[0];
                    }

                    setEvoChain(chain);
                    setSelected({
                        ...data,
                        desc: sData.flavor_text_entries.find(l => l.language.name === 'en')?.flavor_text.replace(/[\n\f]/g, ' '),
                        habitat: sData.habitat?.name || 'desconhecido'
                    });
                } catch (e) { console.error(e); }
            };

            const filtered = useMemo(() => {
                return pokemonList.filter(p => {
                    const matchesSearch = p.name.includes(search.toLowerCase()) || p.id.toString() === search;
                    const matchesType = typeFilter === 'todos' || (p.types && p.types.includes(typeFilter));
                    return matchesSearch && matchesType;
                });
            }, [search, typeFilter, pokemonList]);

            return (
                <div className="min-h-screen pb-10 px-4 md:px-0">
                    <header className="sticky top-0 z-50 bg-slate-950/90 border-b border-slate-800 p-4 md:p-6 backdrop-blur-md">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row gap-6 items-center justify-between">
                            <h1 className="text-3xl font-kanit font-bold text-white tracking-tighter">POKEDEX<span className="text-yellow-400">PRO</span></h1>
                            <div className="flex w-full md:max-w-xl gap-2">
                                <input 
                                    type="text" 
                                    placeholder="Buscar por Nome ou ID..."
                                    className="flex-1 bg-slate-900 border border-slate-700 rounded-2xl p-3 text-sm outline-none focus:border-yellow-400 transition-all"
                                    onChange={e => setSearch(e.target.value)}
                                />
                                <select 
                                    className="bg-slate-900 border border-slate-700 rounded-2xl p-3 text-sm outline-none font-bold"
                                    onChange={e => setTypeFilter(e.target.value)}
                                >
                                    <option value="todos">Tipos</option>
                                    {Object.keys(TRANSLATIONS.types).map(k => <option key={k} value={k}>{TRANSLATIONS.types[k]}</option>)}
                                </select>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto mt-6">
                        <div className="pokedex-grid">
                            {filtered.map(p => (
                                <div key={p.id} onClick={() => loadDetails(p.id)} className="pokemon-card rounded-3xl p-4 flex flex-col items-center cursor-pointer">
                                    <span className="w-full text-left text-slate-500 font-bold text-[10px]">#{p.id}</span>
                                    <img src={p.img} className="w-24 h-24 md:w-32 md:h-32 object-contain my-2 drop-shadow-xl" loading="lazy" />
                                    <h2 className="text-sm font-kanit font-bold capitalize text-white truncate w-full text-center mb-2">{p.name}</h2>
                                    <div className="flex flex-wrap justify-center gap-1">
                                        {p.types?.map(t => (
                                            <span key={t} className={`${COLORS[t]} px-2 py-0.5 rounded-md text-[8px] font-bold uppercase`}>
                                                {TRANSLATIONS.types[t]}
                                            </span>
                                        ))}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>

                    {selected && (
                        <div className="fixed inset-0 modal-overlay flex items-end md:items-center justify-center z-[100] p-0 md:p-4" onClick={() => setSelected(null)}>
                            <div className="bg-slate-950 w-full max-w-5xl max-h-[92vh] md:rounded-[40px] rounded-t-[30px] overflow-y-auto border-t md:border border-slate-800 shadow-2xl relative" onClick={e => e.stopPropagation()}>
                                
                                <div className="sticky top-0 bg-slate-950/95 p-4 border-b border-slate-800 flex justify-between items-center z-50">
                                    <button onClick={() => setSelected(null)} className="text-yellow-400 font-bold text-xs">← VOLTAR</button>
                                    <h2 className="font-kanit font-bold capitalize text-lg">{selected.name}</h2>
                                    <div className="w-10"></div>
                                </div>

                                <div className="p-6 md:p-10 flex flex-col md:flex-row gap-10">
                                    <div className="w-full md:w-1/3 text-center">
                                        <div className="bg-slate-900 rounded-[40px] p-6 mb-4">
                                            <img src={selected.sprites.other['official-artwork'].front_default} className="w-48 h-48 md:w-full mx-auto drop-shadow-2xl" />
                                        </div>
                                        <div className="flex flex-wrap justify-center gap-2 mb-6">
                                            {selected.types.map(t => (
                                                <span key={t.type.name} className={`${COLORS[t.type.name]} px-4 py-1 rounded-xl text-[10px] font-bold uppercase`}>
                                                    {TRANSLATIONS.types[t.type.name]}
                                                </span>
                                            ))}
                                        </div>
                                        <div className="flex justify-center gap-4 text-[10px] font-bold text-slate-500 uppercase">
                                            <span>Altura: {selected.height / 10}m</span>
                                            <span>Peso: {selected.weight / 10}kg</span>
                                        </div>
                                    </div>

                                    <div className="flex-1">
                                        <p className="text-slate-400 text-sm italic mb-8">"{selected.desc}"</p>
                                        
                                        <section className="mb-10">
                                            <h3 className="text-yellow-400 font-kanit font-bold text-[10px] tracking-widest mb-4 uppercase">Status de Base</h3>
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-4">
                                                {selected.stats.map(s => (
                                                    <div key={s.stat.name}>
                                                        <div className="flex justify-between text-[9px] font-bold uppercase mb-1">
                                                            <span className="text-slate-500">{TRANSLATIONS.stats[s.stat.name] || s.stat.name}</span>
                                                            <span>{s.base_stat}</span>
                                                        </div>
                                                        <div className="stat-bar"><div className={`stat-fill ${COLORS[selected.types[0].type.name]}`} style={{ width: `${(s.base_stat / 255) * 100}%` }}></div></div>
                                                    </div>
                                                ))}
                                            </div>
                                        </section>

                                        <section>
                                            <h3 className="text-yellow-400 font-kanit font-bold text-[10px] tracking-widest mb-6 uppercase">Cadeia Evolutiva & Formas</h3>
                                            <div className="space-y-10 relative">
                                                {evoChain.map((step, i) => (
                                                    <div key={step.name} className="flex flex-col gap-4">
                                                        {/* Estagio Principal */}
                                                        <div className="flex items-center gap-4">
                                                            <div className="bg-slate-900 px-3 py-1 rounded-lg text-[9px] font-bold text-slate-500">Estagio {i + 1}</div>
                                                            <div className="h-px bg-slate-800 flex-1"></div>
                                                        </div>
                                                        
                                                        {/* Variacoes do Estagio */}
                                                        <div className="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 gap-3">
                                                            {step.variants.map(v => (
                                                                <div key={v.id} onClick={() => loadDetails(v.id)} className={`cursor-pointer group p-2 rounded-2xl border transition-all ${v.id === selected.id ? 'border-yellow-400 bg-yellow-400/5' : 'border-slate-800 hover:border-slate-600'}`}>
                                                                    <img src={v.img} className="w-12 h-12 mx-auto group-hover:scale-110 transition-transform" />
                                                                    <p className="text-[8px] font-bold capitalize mt-2 text-center text-slate-400 truncate">{v.name.replace(/-/g, ' ')}</p>
                                                                    {v.name.includes('-gmax') && <div className="text-[7px] text-red-500 font-bold text-center mt-1 uppercase">G-Max</div>}
                                                                    {v.name.includes('-mega') && <div className="text-[7px] text-blue-400 font-bold text-center mt-1 uppercase">Mega</div>}
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </section>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

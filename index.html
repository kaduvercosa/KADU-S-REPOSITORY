<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MasterDex</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* VARIÁVEIS E ANIMAÇÕES */
    :root { 
      --type-color: #f5f5f5; 
      --type-dark: #e0e0e0; 
      --text-main: #2a2a2a;
    }
    
    @keyframes float { 0% { transform: translateY(0px); filter: drop-shadow(0 10px 20px rgba(0,0,0,0.15)); } 50% { transform: translateY(-10px); filter: drop-shadow(0 15px 25px rgba(0,0,0,0.1)); } 100% { transform: translateY(0px); filter: drop-shadow(0 10px 20px rgba(0,0,0,0.15)); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
    @keyframes fadeInGrid { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    
    body { margin: 0; padding: 0; background: linear-gradient(135deg, var(--type-color) 0%, var(--type-dark) 100%); background-attachment: fixed; color: var(--text-main); font-family: 'Poppins', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; transition: background 0.8s ease; }
    
    /* CABEÇALHO INTELIGENTE (Hide on Scroll) */
    header { 
      width: 100%; padding: 30px 20px 20px 20px; text-align: center; box-sizing: border-box; 
      background: rgba(255,255,255,0.15); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); 
      border-bottom: 1px solid rgba(255,255,255,0.3); z-index: 100; 
      position: fixed; top: 0; left: 0; 
      transition: transform 0.4s ease-in-out; /* Transição suave para sumir */
    }
    header.hide { transform: translateY(-100%); } /* Joga o cabeçalho para fora da tela */

    h1 { font-family: 'Montserrat', sans-serif; font-size: 32px; font-weight: 900; margin: 0 0 15px 0; letter-spacing: 2px; color: #fff; text-shadow: 0 2px 10px rgba(0,0,0,0.15); }
    #search-input { width: 90%; max-width: 600px; padding: 18px 25px; border-radius: 25px; border: 2px solid rgba(255,255,255,0.5); background: rgba(255,255,255,0.3); backdrop-filter: blur(10px); color: var(--text-main); font-family: 'Poppins', sans-serif; font-size: 16px; outline: none; transition: all 0.3s ease; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
    #search-input::placeholder { color: rgba(0,0,0,0.5); }

    /* GRADE DE POKÉMON - Adicionado padding-top para não ficar embaixo do header fixo */
    #pokedex-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; width: 90%; max-width: 1200px; padding: 180px 0 40px 0; }
    
    .grid-card { background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.5); border-radius: 25px; padding: 20px; text-align: center; cursor: pointer; transition: all 0.2s ease; box-shadow: 0 10px 20px rgba(0,0,0,0.05); display: flex; flex-direction: column; align-items: center; animation: fadeInGrid 0.5s ease backwards; }
    .grid-card:hover { transform: translateY(-8px); background: rgba(255, 255, 255, 0.6); box-shadow: 0 15px 30px rgba(0,0,0,0.1); border-color: rgba(255,255,255,0.7); }
    .grid-card img { width: 100px; height: 100px; object-fit: contain; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1)); }
    .grid-id { background: rgba(0,0,0,0.05); padding: 4px 10px; border-radius: 10px; font-size: 12px; font-weight: 800; color: rgba(0,0,0,0.6); margin-top: 15px; margin-bottom: 5px; }
    .grid-name { font-family: 'Montserrat', sans-serif; font-size: 16px; font-weight: 800; text-transform: capitalize; color: var(--text-main); margin: 0; word-break: break-word; }

    /* MODAL */
    #modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); z-index: 1000; display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: opacity 0.4s ease; overflow-y: auto; padding: 20px; box-sizing: border-box; }
    #modal-overlay.active { opacity: 1; pointer-events: auto; }
    #modal-content { background: rgba(255, 255, 255, 0.5); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); border: 1px solid rgba(255, 255, 255, 0.6); border-radius: 40px; padding: 40px; width: 100%; max-width: 850px; max-height: 90vh; overflow-y: auto; box-shadow: 0 30px 60px rgba(0,0,0,0.15); position: relative; display: flex; flex-direction: column; align-items: center; margin: auto; transform: translateY(30px) scale(0.95); transition: all 0.4s ease; box-sizing: border-box; }
    
    .close-btn { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.4); color: var(--text-main); border: 2px solid rgba(255,255,255,0.6); width: 40px; height: 40px; border-radius: 20px; font-size: 20px; font-weight: bold; cursor: pointer; display: flex; justify-content: center; align-items: center; z-index: 1100; }
    
    .modal-layout { display: flex; flex-direction: column; align-items: center; width: 100%; gap: 20px; }
    #poke-image { width: 220px; height: 220px; object-fit: contain; margin-top: -20px; animation: float 4s ease-in-out infinite; }
    #poke-name { font-family: 'Montserrat', sans-serif; font-size: 36px; font-weight: 900; text-transform: capitalize; margin: 0; color: var(--text-main); }
    #poke-desc { font-style: italic; font-weight: 500; font-size: 14px; line-height: 1.5; color: var(--text-main); background: rgba(255,255,255,0.4); padding: 18px 22px; border-radius: 20px; border-left: 5px solid var(--type-color); margin-bottom: 20px; width: 100%; box-sizing: border-box; text-align: left; }
    
    /* GRELHA DE INFORMAÇÕES - CORRIGIDO */
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; background: rgba(255,255,255,0.3); padding: 22px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.5); box-sizing: border-box; margin-bottom: 20px; }
    .info-item { display: flex; flex-direction: row; align-items: baseline; flex-wrap: wrap; gap: 10px; }
    .info-label { font-size: 11px; color: rgba(0,0,0,0.6); text-transform: uppercase; font-weight: 700; }
    .info-value { font-size: 15px; font-weight: 700; text-transform: capitalize; color: var(--text-main); }
    
    #poke-stats { width: 100%; background: rgba(255,255,255,0.3); padding: 22px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.5); box-sizing: border-box; margin-bottom: 20px;}
    .stat-row { display: flex; align-items: center; margin-bottom: 10px; font-size: 13px; color: var(--text-main); }
    .stat-bar-bg { flex: 1; background: rgba(0,0,0,0.05); height: 10px; border-radius: 5px; margin: 0 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.5); }
    .stat-bar-fill { height: 100%; border-radius: 5px; width: 0; transition: width 0.5s ease-out; background-color: var(--type-color); }
    
    .evo-container { display: flex; justify-content: center; flex-wrap: wrap; gap: 15px; margin-top: 15px; }
    .evo-card { background: rgba(255, 255, 255, 0.4); border: 1px solid rgba(255, 255, 255, 0.6); border-radius: 20px; padding: 15px; text-align: center; cursor: pointer; width: 90px; transition: 0.15s; }

    .loader-container { width: 100%; text-align: center; margin-top: 200px; }
    .loader { border: 4px solid rgba(0,0,0,0.1); border-top: 4px solid var(--text-main); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    @media (min-width: 800px) {
      .modal-layout { flex-direction: row; align-items: stretch; gap: 30px; }
      #poke-image { width: 280px; height: 280px; margin-top: 0; flex-shrink: 0; }
      .info-grid { grid-template-columns: 1fr 1fr 1fr; }
      .info-item { flex-direction: column; align-items: flex-start; gap: 4px; }
      #pokedex-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); padding-top: 200px; }
    }
  </style>
</head>
<body>

  <header id="main-header">
    <h1>MASTERDEX</h1>
    <input type="text" id="search-input" placeholder="Pesquise por nome ou número...">
  </header>

  <div class="loader-container" id="main-loader-container">
    <div class="loader"></div>
  </div>

  <div id="pokedex-grid"></div>

  <div id="modal-overlay" onclick="closeModal(event)">
    <div id="modal-content">
      <button class="close-btn" onclick="forceCloseModal()">×</button>
      <div class="loader-container" id="modal-loader" style="display: none; margin-top: 0;"><div class="loader"></div></div>
      <div class="modal-layout" id="modal-details" style="display: none;">
        <img id="poke-image" src="" alt="">
        <div class="card-content">
          <div id="poke-name"></div>
          <div id="poke-id"></div>
          <div id="poke-types"></div>
          <div id="poke-desc"></div>
          <div class="info-grid">
            <div class="info-item"><span class="info-label">Altura</span><span class="info-value" id="poke-height">-</span></div>
            <div class="info-item"><span class="info-label">Peso</span><span class="info-value" id="poke-weight">-</span></div>
            <div class="info-item"><span class="info-label">Raridade</span><span class="info-value" id="poke-rarity">-</span></div>
            <div class="info-item"><span class="info-label">Geração</span><span class="info-value" id="poke-gen">-</span></div>
            <div class="info-item" style="grid-column: span 2;"><span class="info-label">Habilidades</span><span class="info-value" id="poke-abilities">-</span></div>
          </div>
          <div id="poke-stats"><h3>Atributos Base</h3><div id="stats-list"></div></div>
          <div id="evolutions" style="display: none;"><h3 style="text-align:center; text-transform:uppercase; font-size: 14px; margin-top: 20px;">Cadeia de Evolução</h3><div class="evo-container" id="evo-list"></div></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    /* LÓGICA DO CABEÇALHO INTELIGENTE */
    let lastScrollTop = 0;
    const header = document.getElementById("main-header");

    window.addEventListener("scroll", function() {
        let scrollTop = window.pageYOffset || document.documentElement.scrollTop;
        if (scrollTop > lastScrollTop && scrollTop > 100) {
            header.classList.add("hide"); // Desceu: esconde
        } else {
            header.classList.remove("hide"); // Subiu: mostra
        }
        lastScrollTop = scrollTop <= 0 ? 0 : scrollTop;
    }, false);

    /* RESTANTE DO CÓDIGO INTACTO */
    const typeMap = { normal: 'Normal', fire: 'Fogo', water: 'Água', electric: 'Elétrico', grass: 'Grama', ice: 'Gelo', fighting: 'Lutador', poison: 'Venenoso', ground: 'Terrestre', flying: 'Voador', psychic: 'Psíquico', bug: 'Inseto', rock: 'Pedra', ghost: 'Fantasma', dragon: 'Dragão', dark: 'Sombrio', steel: 'Aço', fairy: 'Fada' };
    const typeColors = { normal: '#9FA19F', fire: '#F45C19', water: '#3A8DE9', electric: '#F2D335', grass: '#53BA4E', ice: '#6CD4D0', fighting: '#CE426B', poison: '#AA6BC8', ground: '#D97944', flying: '#91A8E1', psychic: '#FB8886', bug: '#90C12B', rock: '#C6B78B', ghost: '#5269AD', dragon: '#0B6DC4', dark: '#5A5465', steel: '#5A8FA3', fairy: '#EC8FE6' };
    const statMap = { hp: 'HP', attack: 'ATQ', defense: 'DEF', 'special-attack': 'ATQ.E', 'special-defense': 'DEF.E', speed: 'VEL' };
    const genMap = { 'generation-i': '1ª Gen', 'generation-ii': '2ª Gen', 'generation-iii': '3ª Gen', 'generation-iv': '4ª Gen', 'generation-v': '5ª Gen', 'generation-vi': '6ª Gen', 'generation-vii': '7ª Gen', 'generation-viii': '8ª Gen', 'generation-ix': '9ª Gen' };
    
    let allPokemon = [];
    const TOTAL_POKEMON = 1025;

    async function initPokedex() {
      try {
        const res = await fetch('https://pokeapi.co/api/v2/pokemon?limit=' + TOTAL_POKEMON);
        const data = await res.json();
        allPokemon = data.results;
        renderGrid(allPokemon);
        setInitialDynamicBackground();
        document.getElementById('main-loader-container').style.display = 'none';
      } catch (e) { console.error(e); }
    }

    function setInitialDynamicBackground() {
        const randomEntry = allPokemon[Math.floor(Math.random() * 151)];
        const id = randomEntry.url.split('/').filter(Boolean).pop();
        fetch('https://pokeapi.co/api/v2/pokemon/' + id).then(res => res.json()).then(data => { applyDynamicColors(data.types[0].type.name); });
    }

    function renderGrid(pokemonList) {
      const grid = document.getElementById('pokedex-grid');
      grid.innerHTML = '';
      const fragment = document.createDocumentFragment();
      pokemonList.forEach((poke, index) => {
        const id = poke.url.split('/').filter(Boolean).pop();
        const card = document.createElement('div');
        card.className = 'grid-card';
        if (index < 50) card.style.animationDelay = (index % 20) * 0.03 + 's'; 
        card.onclick = () => openPokemonModal(id);
        card.innerHTML = '<img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/' + id + '.png" loading="lazy" alt="' + poke.name + '"><div class="grid-id">#' + id.padStart(3, '0') + '</div><h4 class="grid-name">' + poke.name.replace('-', ' ') + '</h4>';
        fragment.appendChild(card);
      });
      grid.appendChild(fragment);
    }

    document.getElementById('search-input').addEventListener('input', (e) => {
      const term = e.target.value.toLowerCase();
      const filtered = allPokemon.filter(poke => poke.name.includes(term) || poke.url.includes('/' + term + '/'));
      renderGrid(filtered);
    });

    function shadeColor(color, percent) { 
      let R = parseInt(color.substring(1,3),16), G = parseInt(color.substring(3,5),16), B = parseInt(color.substring(5,7),16); 
      R = parseInt(R * (100 + percent) / 100); G = parseInt(G * (100 + percent) / 100); B = parseInt(B * (100 + percent) / 100); 
      return '#'+(Math.min(255,R).toString(16).padStart(2,'0'))+(Math.min(255,G).toString(16).padStart(2,'0'))+(Math.min(255,B).toString(16).padStart(2,'0')); 
    }

    function applyDynamicColors(typeName) {
        const baseColor = typeColors[typeName] || '#777';
        document.documentElement.style.setProperty('--type-color', baseColor);
        document.documentElement.style.setProperty('--type-dark', shadeColor(baseColor, -20)); 
    }

    async function openPokemonModal(id) {
      const modal = document.getElementById('modal-overlay');
      const details = document.getElementById('modal-details');
      const loader = document.getElementById('modal-loader');
      modal.classList.add('active'); details.style.display = 'none'; loader.style.display = 'block'; document.body.style.overflow = 'hidden';
      try {
        const res = await fetch('https://pokeapi.co/api/v2/pokemon/' + id);
        const data = await res.json();
        applyDynamicColors(data.types[0].type.name);
        document.getElementById('poke-image').src = data.sprites.other['official-artwork'].front_default;
        document.getElementById('poke-name').innerText = data.name.replace('-', ' ');
        document.getElementById('poke-id').innerText = '#' + data.id.toString().padStart(3, '0');
        const typesDiv = document.getElementById('poke-types'); typesDiv.innerHTML = '';
        data.types.forEach(t => {
          let span = document.createElement('span'); span.className = 'type-badge'; span.innerText = typeMap[t.type.name];
          span.style.backgroundColor = typeColors[t.type.name]; typesDiv.appendChild(span);
        });
        document.getElementById('poke-height').innerText = (data.height / 10).toFixed(1) + ' m';
        document.getElementById('poke-weight').innerText = (data.weight / 10).toFixed(1) + ' kg';
        let ptAbilities = await Promise.all(data.abilities.map(async (a) => {
          try {
            let abRes = await fetch(a.ability.url); let abData = await abRes.json();
            let ptName = abData.names.find(n => n.language.name === 'pt-BR'); return ptName ? ptName.name : a.ability.name;
          } catch (e) { return a.ability.name; }
        }));
        document.getElementById('poke-abilities').innerText = ptAbilities.join(', ');
        const speciesRes = await fetch(data.species.url); const speciesData = await speciesRes.json();
        let flavor = speciesData.flavor_text_entries.find(f => f.language.name === 'pt-BR' || f.language.name === 'pt') || speciesData.flavor_text_entries.find(f => f.language.name === 'en');
        let synopsis = flavor ? flavor.flavor_text.replace(/[\f\n\r]/g, ' ') : '...';
        document.getElementById('poke-desc').innerText = '"' + synopsis + '"';
        let rarity = 'Comum', rColor = '#2a2a2a';
        if (speciesData.is_mythical) { rarity = 'Mítico'; rColor = '#a000d0'; } else if (speciesData.is_legendary) { rarity = 'Lendário'; rColor = '#c09000'; } else if (speciesData.is_baby) { rarity = 'Bebê'; rColor = '#00a0f0'; }
        document.getElementById('poke-rarity').innerText = rarity; document.getElementById('poke-rarity').style.color = rColor;
        document.getElementById('poke-gen').innerText = genMap[speciesData.generation.name] || 'Desc.';
        const statsList = document.getElementById('stats-list'); statsList.innerHTML = '';
        data.stats.forEach(s => {
          let pct = Math.min((s.base_stat / 200) * 100, 100);
          let row = document.createElement('div'); row.className = 'stat-row';
          row.innerHTML = `<span class="stat-name">${statMap[s.stat.name]}</span><div class="stat-bar-bg"><div class="stat-bar-fill" style="width: 0;"></div></div><span class="stat-value">${s.base_stat}</span>`;
          statsList.appendChild(row); setTimeout(() => { row.querySelector('.stat-bar-fill').style.width = pct + '%'; }, 100);
        });
        fetchEvolutions(speciesData.evolution_chain.url);
        loader.style.display = 'none'; details.style.display = 'flex'; document.getElementById('modal-overlay').scrollTop = 0;
      } catch (e) { forceCloseModal(); }
    }

    async function fetchEvolutions(url) {
      try {
        const evoRes = await fetch(url); const evoData = await evoRes.json(); let evolutions = [];
        function extractEvo(node) { let parts = node.species.url.split('/'); let id = parts[parts.length - 2]; evolutions.push({ name: node.species.name, id: id }); node.evolves_to.forEach(evo => extractEvo(evo)); }
        extractEvo(evoData.chain); 
        const evoDiv = document.getElementById('evolutions'), evoList = document.getElementById('evo-list'); evoList.innerHTML = '';
        if (evolutions.length > 1) {
          evoDiv.style.display = 'block'; 
          evolutions.forEach(evo => {
            let card = document.createElement('div'); card.className = 'evo-card';
            card.onclick = () => { openPokemonModal(evo.id); };
            card.innerHTML = '<img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/' + evo.id + '.png"><div class="evo-name">' + evo.name + '</div>';
            evoList.appendChild(card);
          });
        } else { evoDiv.style.display = 'none'; }
      } catch (e) {}
    }

    function closeModal(event) { if(event.target.id === 'modal-overlay') forceCloseModal(); }
    function forceCloseModal() { document.getElementById('modal-overlay').classList.remove('active'); document.body.style.overflow = 'auto'; }

    initPokedex();
  </script>
</body>
</html>

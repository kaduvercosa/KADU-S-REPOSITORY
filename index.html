<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokedex Pro - Eduardo Edition</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;700&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        kanit: ['Kanit', 'sans-serif'],
                        montserrat: ['Montserrat', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #020617; color: white; font-family: 'Montserrat', sans-serif; }
        .pokemon-card { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .pokemon-card:hover { transform: translateY(-10px); border-color: #facc15; box-shadow: 0 25px 50px -12px rgba(250, 204, 21, 0.3); }
        .modal-overlay { backdrop-filter: blur(25px); background: rgba(0,0,0,0.8); z-index: 100; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #facc15; }
        .stat-bar { height: 6px; background: #1e293b; border-radius: 3px; overflow: hidden; }
        .stat-fill { height: 100%; transition: width 1s ease-in-out; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const TRANSLATIONS = {
            types: {
                fire: 'Fogo', water: 'Agua', grass: 'Planta', bug: 'Inseto', normal: 'Normal', 
                poison: 'Venenoso', electric: 'Eletrico', ground: 'Terra', fairy: 'Fada', 
                fighting: 'Lutador', psychic: 'Psiquico', rock: 'Pedra', ghost: 'Fantasma', 
                ice: 'Gelo', dragon: 'Dragao', steel: 'Aco', flying: 'Voador', dark: 'Sombrio'
            },
            stats: {
                hp: 'Vida', attack: 'Ataque', defense: 'Defesa', 
                'special-attack': 'Atk. Esp', 'special-defense': 'Def. Esp', speed: 'Veloc'
            }
        };

        const COLORS = {
            fire: 'bg-red-500', water: 'bg-blue-500', grass: 'bg-green-500', 
            bug: 'bg-lime-600', normal: 'bg-slate-400', poison: 'bg-purple-500', 
            electric: 'bg-yellow-400', ground: 'bg-amber-600', fairy: 'bg-pink-400', 
            fighting: 'bg-orange-700', psychic: 'bg-rose-400', rock: 'bg-stone-600', 
            ghost: 'bg-indigo-800', ice: 'bg-cyan-300', dragon: 'bg-violet-600',
            steel: 'bg-gray-500', flying: 'bg-sky-400', dark: 'bg-gray-800'
        };

        function App() {
            const [allPokemon, setAllPokemon] = useState([]);
            const [loading, setLoading] = useState(true);
            const [search, setSearch] = useState('');
            const [typeFilter, setTypeFilter] = useState('todos');
            const [rarityFilter, setRarityFilter] = useState('todos');
            const [selected, setSelected] = useState(null);
            const [evoChain, setEvoChain] = useState([]);

            // Puxa TODOS os pokemons de uma vez (IDs e Nomes)
            useEffect(() => {
                const fetchAll = async () => {
                    try {
                        const res = await fetch('https://pokeapi.co/api/v2/pokemon?limit=1025');
                        const data = await res.json();
                        const basicList = data.results.map((p, index) => ({
                            name: p.name,
                            id: index + 1,
                            url: p.url,
                            img: `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${index + 1}.png`
                        }));
                        setAllPokemon(basicList);
                        setLoading(false);
                        
                        // Carrega detalhes (tipos e raridade) em background para os filtros funcionarem
                        loadFullData(basicList);
                    } catch (e) { console.error(e); }
                };
                fetchAll();
            }, []);

            const loadFullData = async (list) => {
                // Carrega em lotes para nao travar o navegador
                for (let i = 0; i < list.length; i += 50) {
                    const batch = list.slice(i, i + 50);
                    const details = await Promise.all(batch.map(async (p) => {
                        const res = await fetch(p.url);
                        const d = await res.json();
                        const sRes = await fetch(d.species.url);
                        const s = await sRes.json();
                        return { 
                            ...p, 
                            types: d.types.map(t => t.type.name),
                            isLegendary: s.is_legendary,
                            isMythical: s.is_mythical
                        };
                    }));
                    setAllPokemon(prev => {
                        const newList = [...prev];
                        details.forEach(d => { newList[d.id - 1] = d; });
                        return newList;
                    });
                }
            };

            const loadDetails = async (id) => {
                const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`);
                const data = await res.json();
                const sRes = await fetch(data.species.url);
                const sData = await sRes.json();
                
                // Evolucoes
                const eRes = await fetch(sData.evolution_chain.url);
                const eData = await eRes.json();
                let chain = [];
                let curr = eData.chain;
                while(curr) {
                    const pId = curr.species.url.split('/').filter(Boolean).pop();
                    chain.push({
                        name: curr.species.name,
                        id: pId,
                        img: `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${pId}.png`
                    });
                    curr = curr.evolves_to[0];
                }

                setEvoChain(chain);
                setSelected({
                    ...data,
                    description: sData.flavor_text_entries.find(e => e.language.name === 'en')?.flavor_text.replace(/[\n\f]/g, ' '),
                    isLegendary: sData.is_legendary,
                    isMythical: sData.is_mythical,
                    habitat: sData.habitat?.name || 'desconhecido',
                    generation: sData.generation.name.toUpperCase()
                });
            };

            const filtered = useMemo(() => {
                return allPokemon.filter(p => {
                    const matchesSearch = p.name.includes(search.toLowerCase()) || p.id.toString() === search;
                    const matchesType = typeFilter === 'todos' || (p.types && p.types.includes(typeFilter));
                    let matchesRarity = true;
                    if (rarityFilter === 'lendario') matchesRarity = p.isLegendary;
                    else if (rarityFilter === 'mitico') matchesRarity = p.isMythical;
                    else if (rarityFilter === 'comum') matchesRarity = !p.isLegendary && !p.isMythical;
                    return matchesSearch && matchesType && matchesRarity;
                });
            }, [search, typeFilter, rarityFilter, allPokemon]);

            return (
                <div className="min-h-screen">
                    {/* Header com Filtros */}
                    <header className="sticky top-0 z-50 bg-slate-900/90 border-b border-yellow-400/20 p-6 backdrop-blur-xl">
                        <div className="max-w-7xl mx-auto flex flex-col lg:flex-row items-center gap-6">
                            <div className="flex items-center gap-4">
                                <div className="w-12 h-12 bg-red-600 rounded-full border-4 border-white shadow-lg flex items-center justify-center">
                                    <div className="w-4 h-4 bg-white rounded-full animate-ping"></div>
                                </div>
                                <h1 className="text-3xl font-kanit font-bold text-white tracking-tighter">POKEDEX<span className="text-yellow-400">PRO</span></h1>
                            </div>
                            
                            <div className="flex flex-wrap w-full gap-3">
                                <input 
                                    type="text" 
                                    placeholder="Pesquisa instantanea (Nome ou ID)..."
                                    className="flex-1 min-w-[200px] bg-slate-800 border border-slate-700 rounded-2xl p-4 outline-none focus:ring-2 ring-yellow-400 text-white"
                                    onChange={e => setSearch(e.target.value)}
                                />
                                <select className="bg-slate-800 border border-slate-700 rounded-2xl p-4 text-white outline-none" onChange={e => setTypeFilter(e.target.value)}>
                                    <option value="todos">Todos os Tipos</option>
                                    {Object.keys(TRANSLATIONS.types).map(k => <option key={k} value={k}>{TRANSLATIONS.types[k]}</option>)}
                                </select>
                                <select className="bg-slate-800 border border-slate-700 rounded-2xl p-4 text-white outline-none" onChange={e => setRarityFilter(e.target.value)}>
                                    <option value="todos">Todas Raridades</option>
                                    <option value="comum">Comum</option>
                                    <option value="lendario">Lendario</option>
                                    <option value="mitico">Mitico</option>
                                </select>
                            </div>
                        </div>
                    </header>

                    {/* Grid de Cards Completos */}
                    <main className="max-w-7xl mx-auto p-6 grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-6">
                        {filtered.map(p => (
                            <div 
                                key={p.id} 
                                onClick={() => loadDetails(p.id)}
                                className={`pokemon-card bg-slate-800 border-2 border-slate-700 rounded-[30px] p-5 cursor-pointer relative flex flex-col items-center overflow-hidden`}
                            >
                                <span className="absolute top-4 left-5 text-slate-500 font-bold text-xs italic">#{p.id}</span>
                                {p.isLegendary && <span className="absolute top-4 right-4 w-2 h-2 bg-yellow-400 rounded-full shadow-[0_0_10px_#facc15]"></span>}
                                
                                <img src={p.img} className="w-32 h-32 md:w-40 md:h-40 drop-shadow-2xl z-10" />
                                
                                <h2 className="font-kanit font-bold capitalize mt-4 text-lg text-white">{p.name}</h2>
                                
                                <div className="flex flex-wrap justify-center gap-1 mt-3">
                                    {p.types ? p.types.map(t => (
                                        <span key={t} className={`${COLORS[t]} text-[9px] px-2 py-1 rounded-lg font-bold uppercase`}>
                                            {TRANSLATIONS.types[t]}
                                        </span>
                                    )) : <span className="text-[10px] text-slate-600 animate-pulse">Carregando...</span>}
                                </div>
                            </div>
                        ))}
                    </main>

                    {/* Modal com Navegacao por Evolucao */}
                    {selected && (
                        <div className="fixed inset-0 modal-overlay flex items-center justify-center p-4" onClick={() => setSelected(null)}>
                            <div className="bg-slate-900 border border-slate-700 w-full max-w-5xl max-h-[90vh] rounded-[40px] overflow-y-auto" onClick={e => e.stopPropagation()}>
                                
                                <div className="sticky top-0 bg-slate-900/90 p-6 border-b border-slate-800 flex justify-between items-center z-30">
                                    <button onClick={() => setSelected(null)} className="text-yellow-400 font-bold flex items-center gap-2 hover:bg-slate-800 p-2 rounded-xl transition-all">
                                        ← VOLTAR PARA LISTA
                                    </button>
                                    <div className="flex gap-2">
                                        <span className="bg-slate-800 px-3 py-1 rounded-lg text-xs font-bold text-slate-400 uppercase">{selected.generation}</span>
                                        <span className={`px-3 py-1 rounded-lg text-xs font-bold uppercase ${selected.isLegendary ? 'bg-yellow-500 text-black' : selected.isMythical ? 'bg-purple-600 text-white' : 'bg-slate-700 text-white'}`}>
                                            {selected.isLegendary ? 'Lendario' : selected.isMythical ? 'Mitico' : 'Comum'}
                                        </span>
                                    </div>
                                </div>

                                <div className="p-8 md:p-12 flex flex-col lg:flex-row gap-12">
                                    <div className="w-full lg:w-1/3 text-center">
                                        <div className={`rounded-full p-10 mb-6 bg-gradient-to-b from-slate-800 to-transparent shadow-inner`}>
                                            <img src={selected.sprites.other['official-artwork'].front_default} className="w-full drop-shadow-[0_20px_50px_rgba(0,0,0,0.5)]" />
                                        </div>
                                        <h2 className="text-5xl font-kanit font-bold capitalize mb-2">{selected.name}</h2>
                                        <p className="text-slate-400 text-sm leading-relaxed italic mb-6">"{selected.description}"</p>
                                        
                                        <div className="grid grid-cols-2 gap-4">
                                            <div className="bg-slate-800 p-4 rounded-3xl border border-slate-700">
                                                <p className="text-[10px] text-slate-500 font-bold">ALTURA</p>
                                                <p className="text-xl font-bold text-yellow-400">{selected.height / 10}m</p>
                                            </div>
                                            <div className="bg-slate-800 p-4 rounded-3xl border border-slate-700">
                                                <p className="text-[10px] text-slate-500 font-bold">PESO</p>
                                                <p className="text-xl font-bold text-yellow-400">{selected.weight / 10}kg</p>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="flex-1 space-y-10">
                                        <div>
                                            <h3 className="text-yellow-400 font-kanit font-bold mb-6 uppercase text-xs tracking-widest flex items-center gap-4">
                                                ESTATISTICAS BASE <span className="h-px bg-slate-800 flex-1"></span>
                                            </h3>
                                            <div className="space-y-4">
                                                {selected.stats.map(s => (
                                                    <div key={s.stat.name}>
                                                        <div className="flex justify-between text-[10px] font-bold uppercase mb-1">
                                                            <span>{TRANSLATIONS.stats[s.stat.name] || s.stat.name}</span>
                                                            <span className="text-yellow-400">{s.base_stat}</span>
                                                        </div>
                                                        <div className="stat-bar">
                                                            <div className={`stat-fill ${COLORS[selected.types[0].type.name]}`} style={{ width: `${(s.base_stat / 255) * 100}%` }}></div>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>

                                        <div>
                                            <h3 className="text-yellow-400 font-kanit font-bold mb-6 uppercase text-xs tracking-widest flex items-center gap-4">
                                                LINHA EVOLUTIVA <span className="h-px bg-slate-800 flex-1"></span>
                                            </h3>
                                            <div className="flex flex-wrap items-center justify-center gap-6 bg-slate-800/30 p-6 rounded-[30px]">
                                                {evoChain.map((evo, idx) => (
                                                    <React.Fragment key={evo.id}>
                                                        <div 
                                                            onClick={() => loadDetails(evo.id)}
                                                            className={`cursor-pointer group flex flex-col items-center p-4 rounded-2xl transition-all ${evo.id == selected.id ? 'bg-yellow-400/10 border border-yellow-400/50' : 'hover:bg-slate-800'}`}
                                                        >
                                                            <img src={evo.img} className="w-20 h-20 group-hover:scale-110 transition-transform" />
                                                            <p className="text-[10px] font-bold capitalize mt-2 text-slate-400">{evo.name}</p>
                                                        </div>
                                                        {idx < evoChain.length - 1 && <span className="text-slate-700 text-2xl font-bold">➔</span>}
                                                    </React.Fragment>
                                                ))}
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-2 gap-8">
                                            <div>
                                                <h3 className="text-yellow-400 font-kanit font-bold mb-4 uppercase text-xs tracking-widest">HABILIDADES</h3>
                                                <div className="flex flex-wrap gap-2">
                                                    {selected.abilities.map(a => (
                                                        <span key={a.ability.name} className="bg-slate-800 px-4 py-2 rounded-xl text-[10px] font-bold capitalize border border-slate-700">
                                                            {a.ability.name.replace('-', ' ')}
                                                        </span>
                                                    ))}
                                                </div>
                                            </div>
                                            <div>
                                                <h3 className="text-yellow-400 font-kanit font-bold mb-4 uppercase text-xs tracking-widest">HABITAT</h3>
                                                <span className="bg-slate-800 px-4 py-2 rounded-xl text-[10px] font-bold capitalize border border-slate-700 block text-center">
                                                    {selected.habitat}
                                                </span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

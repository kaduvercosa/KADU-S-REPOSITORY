<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pokédex</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --type-color: #6390F0; --type-dark: #3b5690; }
    @keyframes float { 0% { transform: translateY(0px); filter: drop-shadow(0 15px 25px rgba(0,0,0,0.3)); } 50% { transform: translateY(-12px); filter: drop-shadow(0 20px 30px rgba(0,0,0,0.2)); } 100% { transform: translateY(0px); filter: drop-shadow(0 15px 25px rgba(0,0,0,0.3)); } }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
    body { margin: 0; padding: 0; background: linear-gradient(135deg, var(--type-color) 0%, var(--type-dark) 100%); background-attachment: fixed; color: #ffffff; font-family: 'Poppins', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding-bottom: 50px; transition: background 0.3s ease; overflow-x: hidden; }
    #search-container { margin-top: 40px; width: 90%; max-width: 1000px; display: flex; flex-wrap: wrap; gap: 10px; z-index: 10; }
    input { flex: 1; min-width: 180px; padding: 18px 25px; border-radius: 20px; border: 2px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.15); backdrop-filter: blur(20px); color: white; font-family: 'Poppins', sans-serif; font-size: 16px; outline: none; transition: all 0.2s ease; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    input::placeholder { color: rgba(255,255,255,0.7); }
    input:focus { border-color: rgba(255,255,255,0.8); background: rgba(255,255,255,0.25); transform: translateY(-2px); }
    button { flex-shrink: 0; padding: 15px 25px; border-radius: 20px; border: none; background: #ffffff; color: var(--type-dark); font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 16px; cursor: pointer; transition: all 0.15s ease; box-shadow: 0 10px 30px rgba(0,0,0,0.15); letter-spacing: 1px; display: flex; align-items: center; justify-content: center; }
    button:active { transform: scale(0.92); }
    .btn-random { background: rgba(255,255,255,0.2); color: white; border: 2px solid rgba(255,255,255,0.4); backdrop-filter: blur(10px); }
    #content-wrapper { display: flex; flex-direction: column; align-items: center; width: 100%; transition: opacity 0.2s ease; }
    .loading #content-wrapper { opacity: 0; }
    #main-card { margin-top: 30px; background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(30px); border: 1px solid rgba(255, 255, 255, 0.4); border-radius: 35px; padding: 35px 25px; width: 92%; max-width: 1000px; box-shadow: 0 25px 60px rgba(0,0,0,0.2); z-index: 5; display: flex; flex-direction: column; align-items: center; gap: 20px; box-sizing: border-box; animation: fadeIn 0.3s ease; }
    .card-content { width: 100%; display: flex; flex-direction: column; align-items: center; text-align: center; box-sizing: border-box; }
    #poke-image { width: 240px; height: 240px; object-fit: contain; margin-top: -30px; z-index: 10; animation: float 4s ease-in-out infinite; cursor: pointer; transition: transform 0.15s; }
    #poke-image:active { transform: scale(0.9); }
    #poke-name { font-family: 'Montserrat', sans-serif; font-size: 36px; font-weight: 900; text-transform: capitalize; margin: 0; letter-spacing: -1px; line-height: 1.1; word-break: break-word; }
    #poke-id { font-family: 'Montserrat', sans-serif; background: rgba(0,0,0,0.2); padding: 5px 15px; border-radius: 15px; color: #fff; font-weight: 800; font-size: 16px; margin-bottom: 20px; letter-spacing: 2px; margin-top: 10px; display: inline-block; }
    #poke-types { margin-bottom: 25px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .type-badge { padding: 8px 18px; border-radius: 25px; font-weight: 800; font-size: 13px; text-transform: uppercase; border: 2px solid rgba(255,255,255,0.5); box-shadow: 0 8px 15px rgba(0,0,0,0.15); letter-spacing: 1px; cursor: default; }
    #poke-desc { font-style: italic; font-weight: 500; font-size: 14px; line-height: 1.5; color: #fff; background: rgba(0,0,0,0.1); padding: 18px 22px; border-radius: 20px; border-left: 5px solid rgba(255,255,255,0.6); margin-bottom: 25px; width: 100%; box-sizing: border-box; text-align: left; }
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; background: rgba(255,255,255,0.15); padding: 22px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.3); box-sizing: border-box; margin-bottom: 25px; }
    .info-item { display: flex; flex-direction: column; }
    .info-label { font-size: 11px; color: rgba(255,255,255,0.8); text-transform: uppercase; font-weight: 700; margin-bottom: 4px; }
    .info-value { font-size: 15px; font-weight: 700; text-transform: capitalize; color: #fff; }
    #poke-stats { width: 100%; background: rgba(255,255,255,0.15); padding: 22px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.3); box-sizing: border-box; }
    #poke-stats h3 { margin: 0 0 15px 0; font-size: 15px; text-align: center; color: #fff; text-transform: uppercase; font-weight: 800; }
    .stat-row { display: flex; align-items: center; margin-bottom: 10px; font-size: 13px; }
    .stat-name { width: 80px; font-weight: 800; color: rgba(255,255,255,0.9); text-transform: uppercase; font-size: 11px; }
    .stat-bar-bg { flex: 1; background: rgba(0,0,0,0.15); height: 10px; border-radius: 5px; margin: 0 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.2); }
    .stat-bar-fill { height: 100%; border-radius: 5px; width: 0; transition: width 0.4s ease-out; }
    .stat-value { width: 35px; text-align: right; font-weight: 900; font-size: 14px; color: #fff; }
    #evolutions { margin-top: 40px; width: 90%; max-width: 1000px; z-index: 5; }
    .evo-container { display: flex; justify-content: center; flex-wrap: wrap; gap: 15px; margin-top: 20px; }
    .evo-card { background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.4); border-radius: 20px; padding: 15px; text-align: center; cursor: pointer; width: 100px; transition: 0.15s; }
    .evo-card img { width: 75px; height: 75px; object-fit: contain; }
    .evo-name { font-size: 13px; text-transform: capitalize; margin-top: 10px; font-weight: 800; color: #fff; }
    
    @media (min-width: 800px) {
      #search-container { flex-wrap: nowrap; gap: 15px; }
      #main-card { flex-direction: row; align-items: stretch; padding: 40px; gap: 40px; }
      .card-content { flex: 1; align-items: flex-start; text-align: left; min-width: 0; }
      #poke-image { width: 340px; height: 340px; margin-top: 0; flex-shrink: 0; align-self: center; }
      #poke-name { font-size: 48px; }
      #poke-types { justify-content: flex-start; }
      .info-grid { grid-template-columns: 1fr 1fr 1fr; }
      .info-item[style] { grid-column: auto !important; }
      #poke-stats h3 { text-align: left; }
      .evo-card { width: 120px; padding: 20px; }
      .evo-card img { width: 90px; height: 90px; }
    }
  </style>
</head>
<body>
  <div id="search-container">
    <input type="text" id="search-input" placeholder="Nome ou ID...">
    <button onclick="searchPokemon()">BUSCAR</button>
    <button onclick="randomPokemon()" class="btn-random">🎲 ALEATÓRIO</button>
  </div>
  <div id="content-wrapper">
    <div id="main-card">
      <img id="poke-image" src="" alt="" onclick="randomPokemon()">
      <div class="card-content">
        <div id="poke-name">Carregando...</div>
        <div id="poke-id"></div>
        <div id="poke-types"></div>
        <div id="poke-desc"></div>
        <div class="info-grid">
          <div class="info-item"><span class="info-label">Altura</span><span class="info-value" id="poke-height">-</span></div>
          <div class="info-item"><span class="info-label">Peso</span><span class="info-value" id="poke-weight">-</span></div>
          <div class="info-item"><span class="info-label">Raridade</span><span class="info-value" id="poke-rarity">-</span></div>
          <div class="info-item"><span class="info-label">Geração</span><span class="info-value" id="poke-gen">-</span></div>
          <div class="info-item" style="grid-column: 1 / -1;"><span class="info-label">Habilidades</span><span class="info-value" id="poke-abilities">-</span></div>
        </div>
        <div id="poke-stats">
          <h3>Atributos Base</h3>
          <div id="stats-list"></div>
        </div>
      </div>
    </div>
    <div id="evolutions" style="display: none;">
      <h3 style="text-align:center; text-transform:uppercase; letter-spacing:2px; font-weight:800;">Cadeia de Evolução</h3>
      <div class="evo-container" id="evo-list"></div>
    </div>
  </div>

  <script>
    const typeMap = { normal: 'Normal', fire: 'Fogo', water: 'Água', electric: 'Elétrico', grass: 'Grama', ice: 'Gelo', fighting: 'Lutador', poison: 'Venenoso', ground: 'Terrestre', flying: 'Voador', psychic: 'Psíquico', bug: 'Inseto', rock: 'Pedra', ghost: 'Fantasma', dragon: 'Dragão', dark: 'Sombrio', steel: 'Aço', fairy: 'Fada' };
    const typeColors = { normal: '#9FA19F', fire: '#F45C19', water: '#3A8DE9', electric: '#F2D335', grass: '#53BA4E', ice: '#6CD4D0', fighting: '#CE426B', poison: '#AA6BC8', ground: '#D97944', flying: '#91A8E1', psychic: '#FB8886', bug: '#90C12B', rock: '#C6B78B', ghost: '#5269AD', dragon: '#0B6DC4', dark: '#5A5465', steel: '#5A8FA3', fairy: '#EC8FE6' };
    const statMap = { hp: 'HP', attack: 'ATQ', defense: 'DEF', 'special-attack': 'ATQ.E', 'special-defense': 'DEF.E', speed: 'VEL' };
    const genMap = { 'generation-i': '1ª Gen', 'generation-ii': '2ª Gen', 'generation-iii': '3ª Gen', 'generation-iv': '4ª Gen', 'generation-v': '5ª Gen', 'generation-vi': '6ª Gen', 'generation-vii': '7ª Gen', 'generation-viii': '8ª Gen', 'generation-ix': '9ª Gen' };

    function shadeColor(color, percent) { 
      let R = parseInt(color.substring(1,3),16); let G = parseInt(color.substring(3,5),16); let B = parseInt(color.substring(5,7),16); 
      R = parseInt(R * (100 + percent) / 100); G = parseInt(G * (100 + percent) / 100); B = parseInt(B * (100 + percent) / 100); 
      R = (R<255)?R:255; G = (G<255)?G:255; B = (B<255)?B:255; 
      return '#'+(R.toString(16).padStart(2,'0'))+(G.toString(16).padStart(2,'0'))+(B.toString(16).padStart(2,'0')); 
    }

    async function fetchPokemon(query) {
      document.body.classList.add('loading');
      try {
        const res = await fetch('https://pokeapi.co/api/v2/pokemon/' + query.toString().toLowerCase().trim());
        if (!res.ok) throw new Error('Erro');
        const data = await res.json();
        const primaryType = data.types[0].type.name;
        const baseColor = typeColors[primaryType] || '#777';
        
        document.documentElement.style.setProperty('--type-color', baseColor);
        document.documentElement.style.setProperty('--type-dark', shadeColor(baseColor, -40));
        document.getElementById('poke-image').src = data.sprites.other['official-artwork'].front_default;
        document.getElementById('poke-name').innerText = data.name.replace('-', ' ');
        document.getElementById('poke-id').innerText = '#' + data.id.toString().padStart(3, '0');
        
        const typesDiv = document.getElementById('poke-types');
        typesDiv.innerHTML = '';
        data.types.forEach(t => {
          let span = document.createElement('span');
          span.className = 'type-badge'; span.innerText = typeMap[t.type.name] || t.type.name;
          span.style.backgroundColor = typeColors[t.type.name] || '#777';
          typesDiv.appendChild(span);
        });
        
        document.getElementById('poke-height').innerText = (data.height / 10).toFixed(1) + ' m';
        document.getElementById('poke-weight').innerText = (data.weight / 10).toFixed(1) + ' kg';
        
        let ptAbilities = await Promise.all(data.abilities.map(async (a) => {
          try {
            let abRes = await fetch(a.ability.url); let abData = await abRes.json();
            let ptName = abData.names.find(n => n.language.name === 'pt-BR' || n.language.name === 'pt');
            return ptName ? ptName.name : a.ability.name.replace('-', ' ');
          } catch (e) { return a.ability.name.replace('-', ' '); }
        }));
        document.getElementById('poke-abilities').innerText = ptAbilities.join(', ');
        
        const speciesRes = await fetch(data.species.url); const speciesData = await speciesRes.json();
        
        let needsTranslation = false; 
        let flavorEntry = speciesData.flavor_text_entries.find(f => f.language.name === 'pt-BR' || f.language.name === 'pt');
        if (!flavorEntry) { flavorEntry = speciesData.flavor_text_entries.find(f => f.language.name === 'en'); needsTranslation = true; }
        
        let synopsis = flavorEntry ? flavorEntry.flavor_text.replace(/[\f\n\r]/g, ' ') : 'Sinopse não disponível.';
        
        if (needsTranslation && flavorEntry) {
          try {
            const transUrl = 'https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=pt&dt=t&q=' + encodeURIComponent(synopsis);
            const transRes = await fetch(transUrl); const transData = await transRes.json();
            let translated = ''; transData[0].forEach(part => { translated += part[0]; }); synopsis = translated;
          } catch(e) {}
        }
        document.getElementById('poke-desc').innerText = '"' + synopsis + '"';
        
        let rarity = 'Comum'; let rColor = '#ffffff';
        if (speciesData.is_mythical) { rarity = 'Mítico'; rColor = '#FFE082'; } 
        else if (speciesData.is_legendary) { rarity = 'Lendário'; rColor = '#FFF59D'; } 
        else if (speciesData.is_baby) { rarity = 'Bebê'; rColor = '#B3E5FC'; }
        
        let rarityEl = document.getElementById('poke-rarity'); 
        rarityEl.innerText = rarity; rarityEl.style.color = rColor;
        document.getElementById('poke-gen').innerText = genMap[speciesData.generation.name] || 'Desc.';
        
        const statsList = document.getElementById('stats-list'); statsList.innerHTML = '';
        data.stats.forEach(s => {
          let statName = statMap[s.stat.name] || s.stat.name; let pct = Math.min((s.base_stat / 200) * 100, 100);
          let row = document.createElement('div'); row.className = 'stat-row';
          row.innerHTML = '<span class="stat-name">' + statName + '</span><div class="stat-bar-bg"><div class="stat-bar-fill" style="background: #fff;"></div></div><span class="stat-value">' + s.base_stat + '</span>';
          statsList.appendChild(row); setTimeout(() => { row.querySelector('.stat-bar-fill').style.width = pct + '%'; }, 50);
        });
        
        fetchEvolutions(speciesData.evolution_chain.url);
        setTimeout(() => { document.body.classList.remove('loading'); window.scrollTo({ top: 0, behavior: 'smooth' }); }, 100);
      } catch (e) { alert('Pokémon não encontrado!'); document.body.classList.remove('loading'); }
    }

    async function fetchEvolutions(url) {
      try {
        const evoRes = await fetch(url); const evoData = await evoRes.json(); let evolutions = [];
        function extractEvo(node) { let idparts = node.species.url.split('/'); let id = idparts[idparts.length - 2]; evolutions.push({ name: node.species.name, id: id }); node.evolves_to.forEach(evo => extractEvo(evo)); }
        extractEvo(evoData.chain); 
        
        const evoDiv = document.getElementById('evolutions'); const evoList = document.getElementById('evo-list'); evoList.innerHTML = '';
        if (evolutions.length > 1) {
          evoDiv.style.display = 'block'; 
          evolutions.forEach(evo => {
            let card = document.createElement('div'); card.className = 'evo-card';
            card.onclick = () => { document.getElementById('search-input').value = ''; fetchPokemon(evo.id); };
            card.innerHTML = '<img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/' + evo.id + '.png"><div class="evo-name">' + evo.name.replace('-', ' ') + '</div>';
            evoList.appendChild(card);
          });
        } else { evoDiv.style.display = 'none'; }
      } catch (e) {}
    }

    function searchPokemon() { const val = document.getElementById('search-input').value; if(val) fetchPokemon(val); }
    function randomPokemon() { document.getElementById('search-input').value = ''; fetchPokemon(Math.floor(Math.random() * 1010) + 1); }
    document.getElementById('search-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') searchPokemon(); });
    
    randomPokemon();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digidex Elite - Eduardo Pro</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;700&family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        kanit: ['Kanit', 'sans-serif'],
                        montserrat: ['Montserrat', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        * { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        body { font-family: 'Montserrat', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #f8fafc; }
        
        .digi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 12px;
        }
        @media (min-width: 1024px) {
            .digi-grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 24px; }
        }

        .digimon-card { background: white; border: 1px solid #e2e8f0; border-bottom: 4px solid #f97316; }
        .digimon-card:hover { transform: translateY(-8px); border-color: #f97316; box-shadow: 0 15px 30px -10px rgba(249, 115, 22, 0.2); }
        
        .modal-overlay { backdrop-filter: blur(20px); background: rgba(15, 23, 42, 0.85); z-index: 100; }
        .hide-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const TRANSLATIONS = {
            levels: { 'Fresh': 'Bebe', 'In-Training': 'Em Treinamento', 'Rookie': 'Novato', 'Champion': 'Campeao', 'Ultimate': 'Perfeito', 'Mega': 'Mega' },
            attributes: { 'Vaccine': 'Vacina', 'Virus': 'Virus', 'Data': 'Dados', 'Free': 'Livre' }
        };

        function App() {
            const [digimonList, setDigimonList] = useState([]);
            const [loading, setLoading] = useState(true);
            const [search, setSearch] = useState('');
            const [selected, setSelected] = useState(null);

            useEffect(() => {
                const fetchDigimons = async () => {
                    try {
                        // URL com WWW para evitar erros de redicionamento
                        const res = await fetch('https://www.digimon-api.com/api/v1/digimon?pageSize=100');
                        const data = await res.json();
                        if (data && data.content) {
                            setDigimonList(data.content);
                        }
                        setLoading(false);
                    } catch (e) { 
                        console.error("Erro na API:", e);
                        setLoading(false);
                    }
                };
                fetchDigimons();
            }, []);

            const loadDetails = async (id) => {
                try {
                    const res = await fetch(`https://www.digimon-api.com/api/v1/digimon/${id}`);
                    const data = await res.json();
                    setSelected({
                        ...data,
                        level: data.levels?.[0]?.level || 'Desconhecido',
                        attribute: data.attributes?.[0]?.attribute || 'Desconhecido',
                        desc: data.descriptions?.find(d => d.language === 'en')?.description || 'Sem descricao.'
                    });
                } catch (e) { console.error(e); }
            };

            const filtered = useMemo(() => {
                return digimonList.filter(d => d.name.toLowerCase().includes(search.toLowerCase()));
            }, [search, digimonList]);

            return (
                <div className="min-h-screen pb-10">
                    <header className="sticky top-0 z-[60] border-b bg-white/90 backdrop-blur-xl border-slate-200">
                        <div className="max-w-[1800px] mx-auto p-4 md:p-6 flex flex-col md:flex-row justify-between items-center gap-4">
                            <h1 className="text-2xl font-kanit font-bold tracking-tight">DIGIDEX <span className="text-orange-500 font-black text-3xl">PRO</span></h1>
                            <input 
                                type="text" 
                                placeholder="Pesquisar Digimon..."
                                className="w-full md:max-w-md p-3.5 rounded-2xl bg-slate-100 border-none outline-none focus:ring-2 ring-orange-500"
                                onChange={e => setSearch(e.target.value)}
                            />
                        </div>
                    </header>

                    <main className="max-w-[1800px] mx-auto p-4 md:p-8">
                        {loading ? (
                            <div className="text-center py-20 font-kanit animate-pulse text-slate-400">Sincronizando com o Digimundo...</div>
                        ) : (
                            <div className="digi-grid">
                                {filtered.map(d => (
                                    <div key={d.id} onClick={() => loadDetails(d.id)} className="digimon-card rounded-[35px] p-5 cursor-pointer flex flex-col items-center">
                                        <span className="w-full text-slate-300 font-bold text-[10px]">#{d.id}</span>
                                        <img src={d.image} className="w-32 h-32 object-contain my-4 drop-shadow-xl" />
                                        <h2 className="font-kanit font-bold capitalize text-slate-800">{d.name}</h2>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    {selected && (
                        <div className="fixed inset-0 modal-overlay flex items-end md:items-center justify-center z-[100]" onClick={() => setSelected(null)}>
                            <div className="bg-white w-full max-w-4xl h-[85vh] md:h-auto rounded-t-[40px] md:rounded-[40px] overflow-hidden flex flex-col" onClick={e => e.stopPropagation()}>
                                <div className="p-5 border-b flex justify-between items-center bg-white">
                                    <button onClick={() => setSelected(null)} className="bg-orange-600 text-white px-6 py-2 rounded-2xl font-bold text-xs uppercase">← Voltar</button>
                                    <span className="font-kanit font-bold text-orange-600 uppercase">{selected.name}</span>
                                </div>
                                <div className="flex-1 overflow-y-auto p-8 hide-scroll">
                                    <div className="flex flex-col md:flex-row gap-10">
                                        <div className="w-full md:w-1/3 text-center">
                                            <img src={selected.images[0].href} className="w-64 h-64 mx-auto drop-shadow-2xl mb-6" />
                                            <div className="bg-orange-100 text-orange-600 p-3 rounded-2xl font-bold uppercase text-xs">
                                                Nivel: {TRANSLATIONS.levels[selected.level] || selected.level}
                                            </div>
                                        </div>
                                        <div className="flex-1">
                                            <p className="text-slate-500 italic mb-8 leading-relaxed border-l-4 border-orange-200 pl-4">"{selected.desc}"</p>
                                            <h3 className="text-orange-600 font-kanit font-bold text-xs tracking-widest mb-4 uppercase">Atributo</h3>
                                            <p className="bg-slate-100 inline-block px-4 py-2 rounded-xl text-sm font-bold">{TRANSLATIONS.attributes[selected.attribute] || selected.attribute}</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

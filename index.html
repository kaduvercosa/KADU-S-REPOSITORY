<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MasterDex</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --type-color: #1a1a2e; --type-dark: #0f0f1a; --text-main: #2a2a2a; }
    
    @keyframes float { 0% { transform: translateY(0px); filter: drop-shadow(0 10px 20px rgba(0,0,0,0.15)); } 50% { transform: translateY(-10px); filter: drop-shadow(0 15px 25px rgba(0,0,0,0.1)); } 100% { transform: translateY(0px); filter: drop-shadow(0 10px 20px rgba(0,0,0,0.15)); } }
    @keyframes fadeInGrid { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    
    body { margin: 0; padding: 0; background: linear-gradient(135deg, var(--type-color) 0%, var(--type-dark) 100%); background-attachment: fixed; color: #ffffff; font-family: 'Poppins', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; transition: background 0.8s ease; }
    
    /* CABEÇALHO FIXO COM OCULTAÇÃO AO ROLAR */
    header { width: 100%; padding: 30px 20px 20px 20px; text-align: center; box-sizing: border-box; background: rgba(255,255,255,0.15); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.2); z-index: 100; position: fixed; top: 0; left: 0; transition: transform 0.4s ease-in-out; }
    header.hide { transform: translateY(-100%); }
    h1 { font-family: 'Montserrat', sans-serif; font-size: 32px; font-weight: 900; margin: 0 0 15px 0; letter-spacing: 2px; color: #fff; text-shadow: 0 2px 10px rgba(0,0,0,0.15); }
    #search-input { width: 90%; max-width: 600px; padding: 18px 25px; border-radius: 25px; border: 2px solid rgba(255,255,255,0.5); background: rgba(255,255,255,0.3); backdrop-filter: blur(10px); color: var(--text-main); font-family: 'Poppins', sans-serif; font-size: 16px; outline: none; }

    /* GRADE */
    #pokedex-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; width: 92%; max-width: 1200px; padding: 180px 0 40px 0; }
    .grid-card { background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 25px; padding: 20px; text-align: center; cursor: pointer; transition: 0.2s; animation: fadeInGrid 0.4s ease backwards; }
    .grid-card:hover { transform: translateY(-5px); background: rgba(255, 255, 255, 0.5); }
    .grid-card img { width: 100px; height: 100px; object-fit: contain; }
    .grid-id { background: rgba(0,0,0,0.05); padding: 4px 10px; border-radius: 10px; font-size: 11px; font-weight: 800; color: rgba(0,0,0,0.6); margin: 12px 0 5px 0; }
    .grid-name { font-family: 'Montserrat', sans-serif; font-size: 15px; font-weight: 800; text-transform: capitalize; color: var(--text-main); margin: 0; }

    /* MODAL */
    #modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(10px); z-index: 1000; display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: opacity 0.3s; padding: 20px; box-sizing: border-box; }
    #modal-overlay.active { opacity: 1; pointer-events: auto; }
    #modal-content { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(35px); border: 1px solid rgba(255, 255, 255, 0.5); border-radius: 35px; padding: 35px; width: 100%; max-width: 850px; max-height: 90vh; overflow-y: auto; box-shadow: 0 30px 60px rgba(0,0,0,0.2); position: relative; margin: auto; transition: 0.3s; display: flex; flex-direction: column; align-items: center; }
    .close-btn { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.5); color: var(--text-main); border: 1px solid rgba(0,0,0,0.1); width: 40px; height: 40px; border-radius: 20px; font-size: 20px; font-weight: bold; cursor: pointer; display: flex; justify-content: center; align-items: center; }
    
    .modal-layout { display: flex; flex-direction: column; align-items: center; width: 100%; gap: 20px; }
    #poke-image { width: 220px; height: 220px; object-fit: contain; animation: float 4s ease-in-out infinite; }
    #poke-name { font-family: 'Montserrat', sans-serif; font-size: 38px; font-weight: 900; text-transform: capitalize; margin: 0; color: var(--text-main); }
    #poke-id { background: rgba(0,0,0,0.05); padding: 5px 15px; border-radius: 15px; color: var(--text-main); font-weight: 800; font-size: 16px; margin: 10px 0 20px 0; }
    #poke-desc { font-style: italic; font-weight: 500; font-size: 14px; line-height: 1.6; color: var(--text-main); background: rgba(255,255,255,0.3); padding: 20px; border-radius: 20px; border-left: 5px solid var(--type-color); width: 100%; box-sizing: border-box; text-align: left; }
    
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; margin: 20px 0; }
    .info-item { display: flex; flex-direction: row; align-items: baseline; gap: 8px; background: rgba(255,255,255,0.4); padding: 12px 18px; border-radius: 18px; border: 1px solid rgba(255,255,255,0.5); }
    .info-label { font-size: 11px; color: rgba(0,0,0,0.5); text-transform: uppercase; font-weight: 700; }
    .info-value { font-size: 15px; font-weight: 700; color: var(--text-main); }
    
    #poke-stats { width: 100%; background: rgba(255,255,255,0.4); padding: 25px; border-radius: 25px; box-sizing: border-box; }
    .stat-row { display: flex; align-items: center; margin-bottom: 12px; font-size: 13px; color: var(--text-main); }
    .stat-name { width: 85px; font-weight: 800; text-transform: uppercase; font-size: 10px; color: rgba(0,0,0,0.5); }
    .stat-bar-bg { flex: 1; background: rgba(0,0,0,0.05); height: 10px; border-radius: 5px; margin: 0 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.5); }
    .stat-bar-fill { height: 100%; border-radius: 5px; width: 0; transition: width 0.8s ease-out; background-color: var(--type-color); }
    .stat-value { width: 30px; text-align: right; font-weight: 800; }

    #evolutions { width: 100%; margin-top: 20px; }
    .evo-container { display: flex; justify-content: center; flex-wrap: wrap; gap: 15px; margin-top: 15px; }
    .evo-card { background: rgba(255,255,255,0.4); border: 1px solid rgba(255,255,255,0.5); border-radius: 20px; padding: 15px; text-align: center; cursor: pointer; width: 100px; transition: 0.2s; }
    .evo-card:hover { transform: translateY(-3px); background: rgba(255,255,255,0.6); }
    .evo-card img { width: 70px; height: 70px; object-fit: contain; }

    .loader { border: 4px solid rgba(0,0,0,0.05); border-top: 4px solid var(--text-main); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 50px auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    @media (min-width: 800px) {
      .modal-layout { flex-direction: row; align-items: stretch; gap: 40px; }
      #poke-image { width: 320px; height: 320px; margin-top: 0; flex-shrink: 0; }
      .info-grid { grid-template-columns: 1fr 1fr 1fr; }
      .info-item { flex-direction: column; align-items: flex-start; gap: 2px; }
      #pokedex-grid { padding-top: 200px; }
    }
  </style>
</head>
<body>

  <header id="main-header">
    <h1>MASTERDEX</h1>
    <input type="text" id="search-input" placeholder="Pesquisar Pokémon...">
  </header>

  <div id="pokedex-grid"></div>
  <div class="loader" id="main-loader"></div>

  <div id="modal-overlay" onclick="if(event.target.id==='modal-overlay') forceCloseModal()">
    <div id="modal-content">
      <button class="close-btn" onclick="forceCloseModal()">×</button>
      <div id="modal-loader" class="loader" style="display:none"></div>
      <div class="modal-layout" id="modal-details" style="display:none">
        <div style="display:flex; flex-direction:column; align-items:center;">
          <img id="poke-image" src="">
          <div id="poke-id"></div>
        </div>
        <div class="card-content">
          <div id="poke-name"></div>
          <div id="poke-types" style="margin: 15px 0"></div>
          <div id="poke-desc"></div>
          
          <div class="info-grid">
            <div class="info-item"><span class="info-label">Altura</span><span class="info-value" id="poke-height"></span></div>
            <div class="info-item"><span class="info-label">Peso</span><span class="info-value" id="poke-weight"></span></div>
            <div class="info-item"><span class="info-label">Raridade</span><span class="info-value" id="poke-rarity"></span></div>
            <div class="info-item"><span class="info-label">Geração</span><span class="info-value" id="poke-gen"></span></div>
            <div class="info-item" style="grid-column: span 2;"><span class="info-label">Habilidades</span><span class="info-value" id="poke-abilities"></span></div>
          </div>
          
          <div id="poke-stats">
            <h3 style="text-align:center; font-size:14px; text-transform:uppercase; margin-bottom:15px;">Atributos</h3>
            <div id="stats-list"></div>
          </div>
          
          <div id="evolutions" style="display:none">
            <h3 style="text-align:center; text-transform:uppercase; font-size:12px; letter-spacing:1px; color:rgba(0,0,0,0.5);">Evoluções</h3>
            <div class="evo-container" id="evo-list"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const typeMap = { normal: 'Normal', fire: 'Fogo', water: 'Água', electric: 'Elétrico', grass: 'Grama', ice: 'Gelo', fighting: 'Lutador', poison: 'Venenoso', ground: 'Terrestre', flying: 'Voador', psychic: 'Psíquico', bug: 'Inseto', rock: 'Pedra', ghost: 'Fantasma', dragon: 'Dragão', dark: 'Sombrio', steel: 'Aço', fairy: 'Fada' };
    const typeColors = { normal: '#9FA19F', fire: '#F45C19', water: '#3A8DE9', electric: '#F2D335', grass: '#53BA4E', ice: '#6CD4D0', fighting: '#CE426B', poison: '#AA6BC8', ground: '#D97944', flying: '#91A8E1', psychic: '#FB8886', bug: '#90C12B', rock: '#C6B78B', ghost: '#5269AD', dragon: '#0B6DC4', dark: '#5A5465', steel: '#5A8FA3', fairy: '#EC8FE6' };
    const statMap = { hp: 'HP', attack: 'ATQ', defense: 'DEF', 'special-attack': 'ATQ.E', 'special-defense': 'DEF.E', speed: 'VEL' };
    const genMap = { 'generation-i': '1ª Gen', 'generation-ii': '2ª Gen', 'generation-iii': '3ª Gen', 'generation-iv': '4ª Gen', 'generation-v': '5ª Gen', 'generation-vi': '6ª Gen', 'generation-vii': '7ª Gen', 'generation-viii': '8ª Gen', 'generation-ix': '9ª Gen' };

    let allPokemon = [];
    let lastScrollTop = 0;

    // Efeito Header
    window.addEventListener("scroll", () => {
      let st = window.pageYOffset || document.documentElement.scrollTop;
      if (st > lastScrollTop && st > 100) document.getElementById("main-header").classList.add("hide");
      else document.getElementById("main-header").classList.remove("hide");
      lastScrollTop = st <= 0 ? 0 : st;
    });

    async function init() {
      const res = await fetch('https://pokeapi.co/api/v2/pokemon?limit=1025');
      const data = await res.json();
      allPokemon = data.results;
      renderGrid(allPokemon);
      document.getElementById('main-loader').style.display='none';
      
      // Cor de fundo inicial aleatória
      const randId = Math.floor(Math.random() * 151) + 1;
      fetch(`https://pokeapi.co/api/v2/pokemon/${randId}`).then(r => r.json()).then(d => applyColors(d.types[0].type.name));
    }

    function renderGrid(list) {
      const grid = document.getElementById('pokedex-grid'); grid.innerHTML = '';
      const frag = document.createDocumentFragment();
      list.forEach((p, i) => {
        const id = p.url.split('/').filter(Boolean).pop();
        const card = document.createElement('div'); card.className = 'grid-card';
        if (i < 50) card.style.animationDelay = (i % 20) * 0.03 + 's';
        card.onclick = () => openModal(id);
        card.innerHTML = `<img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${id}.png" loading="lazy"><div class="grid-id">#${id.padStart(3,'0')}</div><h4 class="grid-name">${p.name.replace(/-/g, ' ')}</h4>`;
        frag.appendChild(card);
      });
      grid.appendChild(frag);
    }

    function applyColors(t) {
      const c = typeColors[t] || '#777';
      document.documentElement.style.setProperty('--type-color', c);
      let r=parseInt(c.substring(1,3),16), g=parseInt(c.substring(3,5),16), b=parseInt(c.substring(5,7),16);
      document.documentElement.style.setProperty('--type-dark', `rgb(${Math.round(r*0.6)},${Math.round(g*0.6)},${Math.round(b*0.6)})`);
    }

    async function openModal(id) {
      const modal = document.getElementById('modal-overlay');
      modal.classList.add('active');
      document.getElementById('modal-loader').style.display = 'block';
      document.getElementById('modal-details').style.display = 'none';
      document.body.style.overflow = 'hidden';

      try {
        const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`);
        const data = await res.json();
        applyColors(data.types[0].type.name);

        document.getElementById('poke-image').src = data.sprites.other['official-artwork'].front_default;
        document.getElementById('poke-name').innerText = data.name.replace(/-/g, ' ');
        document.getElementById('poke-id').innerText = '#' + data.id.toString().padStart(3, '0');
        document.getElementById('poke-height').innerText = (data.height / 10).toFixed(1) + ' m';
        document.getElementById('poke-weight').innerText = (data.weight / 10).toFixed(1) + ' kg';

        // Tipos
        const typesDiv = document.getElementById('poke-types'); typesDiv.innerHTML = '';
        data.types.forEach(t => {
          let s = document.createElement('span'); s.style.cssText = `padding:8px 18px; border-radius:20px; font-weight:800; font-size:12px; text-transform:uppercase; color:#fff; margin:5px; background:${typeColors[t.type.name]}; display:inline-block;`;
          s.innerText = typeMap[t.type.name]; typesDiv.appendChild(s);
        });

        // Stats (Atributos) - CORRIGIDO
        const statsList = document.getElementById('stats-list'); statsList.innerHTML = '';
        data.stats.forEach(s => {
          const pct = Math.min((s.base_stat / 200) * 100, 100);
          const row = document.createElement('div'); row.className = 'stat-row';
          row.innerHTML = `<span class="stat-name">${statMap[s.stat.name] || s.stat.name}</span>
                           <div class="stat-bar-bg"><div class="stat-bar-fill" style="width:${pct}%"></div></div>
                           <span class="stat-value">${s.base_stat}</span>`;
          statsList.appendChild(row);
        });

        // Habilidades
        let abilities = await Promise.all(data.abilities.map(async (a) => {
          const r = await fetch(a.ability.url); const d = await r.json();
          const n = d.names.find(x => x.language.name === 'pt-BR'); return n ? n.name : a.ability.name;
        }));
        document.getElementById('poke-abilities').innerText = abilities.join(', ');

        // Descrição e Raridade
        const specRes = await fetch(data.species.url); const specData = await specRes.json();
        let flavor = specData.flavor_text_entries.find(x => x.language.name === 'pt-BR') || specData.flavor_text_entries.find(x => x.language.name === 'en');
        let synopsis = flavor ? flavor.flavor_text.replace(/[\f\n\r]/g, ' ') : '...';
        if (flavor && flavor.language.name === 'en') {
          const tr = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=pt&dt=t&q=${encodeURIComponent(synopsis)}`);
          const trd = await tr.json(); synopsis = trd[0].map(x => x[0]).join('');
        }
        document.getElementById('poke-desc').innerText = `"${synopsis}"`;

        let rar = 'Comum', rc = '#2a2a2a';
        if (specData.is_mythical) { rar = 'Mítico'; rc = '#a000d0'; } 
        else if (specData.is_legendary) { rar = 'Lendário'; rc = '#c09000'; } 
        else if (specData.is_baby) { rar = 'Bebê'; rc = '#00a0f0'; }
        document.getElementById('poke-rarity').innerText = rar; document.getElementById('poke-rarity').style.color = rc;
        document.getElementById('poke-gen').innerText = genMap[specData.generation.name] || 'Desc.';

        // Evoluções - CORRIGIDO
        fetchEvolutions(specData.evolution_chain.url);

        document.getElementById('modal-loader').style.display = 'none';
        document.getElementById('modal-details').style.display = 'flex';
        document.getElementById('modal-overlay').scrollTop = 0;
      } catch (e) { console.error(e); forceCloseModal(); }
    }

    async function fetchEvolutions(url) {
      const r = await fetch(url); const d = await r.json(); let evos = [];
      function getE(n) { evos.push({ name: n.species.name, id: n.species.url.split('/').filter(Boolean).pop() }); n.evolves_to.forEach(getE); }
      getE(d.chain);
      const div = document.getElementById('evolutions'); const list = document.getElementById('evo-list'); list.innerHTML = '';
      if (evos.length > 1) {
        div.style.display = 'block';
        evos.forEach(e => {
          let c = document.createElement('div'); c.className = 'evo-card'; c.onclick = () => openModal(e.id);
          c.innerHTML = `<img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${e.id}.png"><div style="font-size:10px; font-weight:800; text-transform:capitalize; margin-top:5px; color:#2a2a2a">${e.name}</div>`;
          list.appendChild(c);
        });
      } else div.style.display = 'none';
    }

    function forceCloseModal() { document.getElementById('modal-overlay').classList.remove('active'); document.body.style.overflow = 'auto'; }
    
    document.getElementById('search-input').oninput = (e) => {
      const t = e.target.value.toLowerCase();
      renderGrid(allPokemon.filter(p => p.name.includes(t) || p.url.includes('/' + t + '/')));
    };

    init();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokedex Pro - Eduardo Ultimate</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;700&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        kanit: ['Kanit', 'sans-serif'],
                        montserrat: ['Montserrat', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #020617; color: white; font-family: 'Montserrat', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        /* Organizacao do Grid */
        .pokedex-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* Celular: 2 colunas */
            gap: 12px;
        }
        @media (min-width: 640px) { .pokedex-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (min-width: 1024px) { .pokedex-grid { grid-template-columns: repeat(5, 1fr); gap: 20px; } }
        @media (min-width: 1536px) { .pokedex-grid { grid-template-columns: repeat(8, 1fr); } }

        /* Card Visual */
        .pokemon-card { 
            background: #0f172a;
            border: 1px solid #1e293b;
            border-bottom: 4px solid #1e293b;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .pokemon-card:hover {
            transform: translateY(-5px);
            border-color: #facc15;
            background: #1e293b;
        }

        .modal-overlay { backdrop-filter: blur(12px); background: rgba(0,0,0,0.85); z-index: 100; }
        .stat-fill { height: 100%; transition: width 1s ease-out; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        
        /* Animacao de entrada */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-card { animation: fadeIn 0.4s ease forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const TRANSLATIONS = {
            types: {
                fire: 'Fogo', water: 'Agua', grass: 'Planta', bug: 'Inseto', normal: 'Normal', 
                poison: 'Venenoso', electric: 'Eletrico', ground: 'Terra', fairy: 'Fada', 
                fighting: 'Lutador', psychic: 'Psiquico', rock: 'Pedra', ghost: 'Fantasma', 
                ice: 'Gelo', dragon: 'Dragao', steel: 'Aco', flying: 'Voador', dark: 'Sombrio'
            },
            stats: {
                hp: 'Vida', attack: 'Ataque', defense: 'Defesa', 
                'special-attack': 'Atk Esp', 'special-defense': 'Def Esp', speed: 'Veloc'
            }
        };

        const COLORS = {
            fire: 'bg-red-500', water: 'bg-blue-500', grass: 'bg-green-500', 
            bug: 'bg-lime-600', normal: 'bg-slate-400', poison: 'bg-purple-500', 
            electric: 'bg-yellow-400', ground: 'bg-amber-600', fairy: 'bg-pink-400', 
            fighting: 'bg-orange-700', psychic: 'bg-rose-400', rock: 'bg-stone-600', 
            ghost: 'bg-indigo-800', ice: 'bg-cyan-300', dragon: 'bg-violet-600',
            steel: 'bg-gray-500', flying: 'bg-sky-400', dark: 'bg-gray-800'
        };

        function App() {
            const [allPokemon, setAllPokemon] = useState([]);
            const [loading, setLoading] = useState(true);
            const [search, setSearch] = useState('');
            const [typeFilter, setTypeFilter] = useState('todos');
            const [selected, setSelected] = useState(null);
            const [evoChain, setEvoChain] = useState([]);

            useEffect(() => {
                const fetchInitial = async () => {
                    // Carrega os primeiros 1025 de uma vez para busca instantanea
                    const res = await fetch('https://pokeapi.co/api/v2/pokemon?limit=1025');
                    const data = await res.json();
                    const list = data.results.map((p, i) => ({
                        name: p.name,
                        id: i + 1,
                        img: `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${i + 1}.png`
                    }));
                    setAllPokemon(list);
                    setLoading(false);
                    loadTypesInBackground(list);
                };
                fetchInitial();
            }, []);

            const loadTypesInBackground = async (list) => {
                for (let i = 0; i < list.length; i += 40) {
                    const batch = list.slice(i, i + 40);
                    const details = await Promise.all(batch.map(async p => {
                        const r = await fetch(`https://pokeapi.co/api/v2/pokemon/${p.id}`);
                        const d = await r.json();
                        return { ...p, types: d.types.map(t => t.type.name) };
                    }));
                    setAllPokemon(prev => {
                        const copy = [...prev];
                        details.forEach(d => { copy[d.id - 1] = d; });
                        return copy;
                    });
                }
            };

            const loadDetails = async (idOrName) => {
                try {
                    const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${idOrName}`);
                    const data = await res.json();
                    const sRes = await fetch(data.species.url);
                    const sData = await sRes.json();
                    const eRes = await fetch(sData.evolution_chain.url);
                    const eData = await eRes.json();

                    let chain = [];
                    let curr = eData.chain;

                    while (curr) {
                        const name = curr.species.name;
                        const speciesRes = await fetch(`https://pokeapi.co/api/v2/pokemon-species/${name}`);
                        const specData = await speciesRes.json();
                        
                        const varieties = await Promise.all(specData.varieties.map(async v => {
                            const vRes = await fetch(v.pokemon.url);
                            const vData = await vRes.json();
                            return {
                                name: v.pokemon.name,
                                id: vData.id,
                                img: vData.sprites.other['official-artwork'].front_default || vData.sprites.front_default
                            };
                        }));

                        chain.push({ name, varieties });
                        curr = curr.evolves_to[0];
                    }

                    setEvoChain(chain);
                    setSelected({
                        ...data,
                        desc: sData.flavor_text_entries.find(l => l.language.name === 'en')?.flavor_text.replace(/[\n\f]/g, ' '),
                        habitat: sData.habitat?.name || 'desconhecido'
                    });
                } catch (err) { console.error("Erro ao carregar detalhes", err); }
            };

            const filtered = useMemo(() => {
                return allPokemon.filter(p => {
                    const matchesSearch = p.name.includes(search.toLowerCase()) || p.id.toString() === search;
                    const matchesType = typeFilter === 'todos' || (p.types && p.types.includes(typeFilter));
                    return matchesSearch && matchesType;
                });
            }, [search, typeFilter, allPokemon]);

            return (
                <div className="min-h-screen pb-10">
                    {/* Header Organizado */}
                    <header className="sticky top-0 z-50 bg-slate-950/95 border-b border-slate-800 p-4 md:p-6 backdrop-blur-md">
                        <div className="max-w-[1400px] mx-auto flex flex-col md:flex-row gap-6 items-center justify-between">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 bg-red-600 rounded-full border-2 border-white shadow-lg"></div>
                                <h1 className="text-2xl font-kanit font-bold text-white tracking-tighter">POKEDEX<span className="text-yellow-400">PRO</span></h1>
                            </div>
                            
                            <div className="flex w-full md:max-w-2xl gap-3">
                                <input 
                                    type="text" 
                                    placeholder="Nome ou ID..."
                                    className="flex-1 bg-slate-900 border border-slate-700 rounded-2xl p-4 text-sm outline-none focus:border-yellow-400 transition-all shadow-inner"
                                    onChange={e => setSearch(e.target.value)}
                                />
                                <select 
                                    className="bg-slate-900 border border-slate-700 rounded-2xl p-4 text-sm outline-none font-bold text-slate-400"
                                    onChange={e => setTypeFilter(e.target.value)}
                                >
                                    <option value="todos">Todos Tipos</option>
                                    {Object.keys(TRANSLATIONS.types).map(k => <option key={k} value={k}>{TRANSLATIONS.types[k]}</option>)}
                                </select>
                            </div>
                        </div>
                    </header>

                    {/* Grid de Pokemons com Info Restaurada */}
                    <main className="max-w-[1400px] mx-auto p-4 md:p-8">
                        <div className="pokedex-grid">
                            {filtered.map((p, index) => (
                                <div 
                                    key={`${p.id}-${index}`}
                                    onClick={() => loadDetails(p.id)}
                                    className="pokemon-card rounded-[32px] p-5 flex flex-col items-center cursor-pointer animate-card"
                                >
                                    <div className="w-full flex justify-between items-center mb-2">
                                        <span className="text-slate-500 font-bold text-xs uppercase tracking-widest">#{p.id}</span>
                                    </div>
                                    
                                    <img src={p.img} className="w-28 h-28 md:w-36 md:h-36 object-contain drop-shadow-2xl my-3" loading="lazy" />
                                    
                                    <h2 className="text-sm md:text-base font-kanit font-bold capitalize text-white mb-3">{p.name}</h2>
                                    
                                    <div className="flex flex-wrap justify-center gap-1.5 w-full">
                                        {p.types ? p.types.map(t => (
                                            <span key={t} className={`${COLORS[t]} px-3 py-1 rounded-lg text-[9px] font-bold uppercase text-white shadow-sm`}>
                                                {TRANSLATIONS.types[t]}
                                            </span>
                                        )) : (
                                            <div className="h-4 w-16 bg-slate-800 rounded animate-pulse"></div>
                                        )}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>

                    {/* Modal Pro com Foco em Conteudo e Navegacao */}
                    {selected && (
                        <div className="fixed inset-0 modal-overlay flex items-end md:items-center justify-center z-[100] p-0 md:p-4" onClick={() => setSelected(null)}>
                            <div 
                                className="bg-slate-900 w-full max-w-5xl max-h-[92vh] md:rounded-[48px] rounded-t-[40px] overflow-y-auto border-t md:border border-slate-800 shadow-2xl relative"
                                onClick={e => e.stopPropagation()}
                            >
                                {/* Header do Modal */}
                                <div className="sticky top-0 bg-slate-900/90 p-6 border-b border-slate-800 flex justify-between items-center z-50 backdrop-blur-md">
                                    <button onClick={() => setSelected(null)} className="bg-slate-800 hover:bg-slate-700 px-5 py-2.5 rounded-2xl text-yellow-400 font-bold text-xs tracking-widest transition-all">
                                        ← VOLTAR
                                    </button>
                                    <div className="flex gap-2">
                                        {selected.types.map(t => (
                                            <span key={t.type.name} className={`${COLORS[t.type.name]} px-4 py-1.5 rounded-xl text-[10px] font-bold uppercase`}>
                                                {TRANSLATIONS.types[t.type.name]}
                                            </span>
                                        ))}
                                    </div>
                                </div>

                                <div className="p-6 md:p-12">
                                    <div className="flex flex-col lg:flex-row gap-12">
                                        {/* Coluna Visual */}
                                        <div className="w-full lg:w-2/5 text-center">
                                            <div className="bg-gradient-to-b from-slate-800 to-transparent rounded-[60px] p-8 mb-6">
                                                <img src={selected.sprites.other['official-artwork'].front_default} className="w-64 h-64 md:w-full mx-auto drop-shadow-[0_20px_50px_rgba(0,0,0,0.5)]" />
                                            </div>
                                            <h2 className="text-5xl font-kanit font-bold capitalize text-white mb-2">{selected.name}</h2>
                                            <p className="text-slate-400 text-sm italic leading-relaxed px-4">"{selected.desc}"</p>
                                        </div>

                                        {/* Coluna Dados */}
                                        <div className="flex-1 space-y-10">
                                            {/* Stats */}
                                            <section>
                                                <h3 className="text-yellow-400 font-kanit font-bold text-xs tracking-[0.3em] mb-6 uppercase flex items-center gap-3">
                                                    <span className="w-8 h-px bg-yellow-400/30"></span> Status de Combate
                                                </h3>
                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-x-10 gap-y-5">
                                                    {selected.stats.map(s => (
                                                        <div key={s.stat.name}>
                                                            <div className="flex justify-between text-[10px] font-bold uppercase mb-2">
                                                                <span className="text-slate-500">{TRANSLATIONS.stats[s.stat.name] || s.stat.name}</span>
                                                                <span className="text-white">{s.base_stat}</span>
                                                            </div>
                                                            <div className="h-2 bg-slate-800 rounded-full overflow-hidden">
                                                                <div className={`stat-fill ${COLORS[selected.types[0].type.name]}`} style={{ width: `${(s.base_stat / 255) * 100}%` }}></div>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </section>

                                            {/* Evolucoes e Variantes (Megas/Gmax inclusos) */}
                                            <section>
                                                <h3 className="text-yellow-400 font-kanit font-bold text-xs tracking-[0.3em] mb-6 uppercase flex items-center gap-3">
                                                    <span className="w-8 h-px bg-yellow-400/30"></span> Linha Evolutiva & Formas
                                                </h3>
                                                <div className="space-y-6">
                                                    {evoChain.map((step, i) => (
                                                        <div key={step.name} className="flex flex-col items-center">
                                                            <div className="w-full flex items-center gap-4 overflow-x-auto pb-4 hide-scroll bg-slate-800/30 p-4 rounded-[32px] border border-slate-800/50">
                                                                {step.varieties.map(v => (
                                                                    <div 
                                                                        key={v.name} 
                                                                        onClick={() => loadDetails(v.id)}
                                                                        className={`shrink-0 flex flex-col items-center p-3 rounded-2xl border transition-all ${v.id === selected.id ? 'border-yellow-400 bg-yellow-400/5 shadow-lg shadow-yellow-400/10' : 'border-transparent hover:bg-slate-800'} cursor-pointer`}
                                                                    >
                                                                        <img src={v.img} className="w-16 h-16 object-contain" />
                                                                        <p className="text-[10px] font-bold capitalize mt-2 text-slate-400 text-center max-w-[90px] truncate">{v.name.replace(/-/g, ' ')}</p>
                                                                    </div>
                                                                ))}
                                                            </div>
                                                            {i < evoChain.length - 1 && <div className="text-yellow-400/20 my-2 text-2xl">↓</div>}
                                                        </div>
                                                    ))}
                                                </div>
                                            </section>

                                            {/* Info Extra */}
                                            <div className="grid grid-cols-2 gap-4">
                                                <div className="bg-slate-800/50 p-5 rounded-3xl border border-slate-800">
                                                    <p className="text-[10px] text-slate-500 font-bold mb-1 uppercase">Habilidades</p>
                                                    <div className="flex flex-wrap gap-2">
                                                        {selected.abilities.map(a => (
                                                            <span key={a.ability.name} className="text-xs font-bold capitalize text-white">{a.ability.name.replace(/-/g, ' ')}</span>
                                                        ))}
                                                    </div>
                                                </div>
                                                <div className="bg-slate-800/50 p-5 rounded-3xl border border-slate-800">
                                                    <p className="text-[10px] text-slate-500 font-bold mb-1 uppercase">Habitat</p>
                                                    <p className="text-xs font-bold capitalize text-white">{selected.habitat}</p>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

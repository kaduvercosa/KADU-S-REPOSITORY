<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokedex Pro - Ultimate Evolution</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;700&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        kanit: ['Kanit', 'sans-serif'],
                        montserrat: ['Montserrat', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #020617; color: white; font-family: 'Montserrat', sans-serif; -webkit-tap-highlight-color: transparent; }
        .pokemon-card { transition: all 0.3s ease; border-bottom: 3px solid transparent; }
        @media (min-width: 1024px) {
            .pokemon-card:hover { transform: translateY(-8px); border-color: #facc15; box-shadow: 0 20px 40px -15px rgba(250, 204, 21, 0.3); }
        }
        .modal-overlay { backdrop-filter: blur(16px); background: rgba(0,0,0,0.85); z-index: 100; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        .stat-fill { height: 100%; transition: width 1s ease; }
        .hide-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const TRANSLATIONS = {
            types: {
                fire: 'Fogo', water: 'Agua', grass: 'Planta', bug: 'Inseto', normal: 'Normal', 
                poison: 'Venenoso', electric: 'Eletrico', ground: 'Terra', fairy: 'Fada', 
                fighting: 'Lutador', psychic: 'Psiquico', rock: 'Pedra', ghost: 'Fantasma', 
                ice: 'Gelo', dragon: 'Dragao', steel: 'Aco', flying: 'Voador', dark: 'Sombrio'
            },
            stats: {
                hp: 'HP', attack: 'Ataque', defense: 'Defesa', 
                'special-attack': 'Atk Esp', 'special-defense': 'Def Esp', speed: 'Veloc'
            }
        };

        const COLORS = {
            fire: 'bg-red-500', water: 'bg-blue-500', grass: 'bg-green-500', 
            bug: 'bg-lime-600', normal: 'bg-slate-400', poison: 'bg-purple-500', 
            electric: 'bg-yellow-400', ground: 'bg-amber-600', fairy: 'bg-pink-400', 
            fighting: 'bg-orange-700', psychic: 'bg-rose-400', rock: 'bg-stone-600', 
            ghost: 'bg-indigo-800', ice: 'bg-cyan-300', dragon: 'bg-violet-600',
            steel: 'bg-gray-500', flying: 'bg-sky-400', dark: 'bg-gray-800'
        };

        function App() {
            const [allPokemon, setAllPokemon] = useState([]);
            const [loading, setLoading] = useState(true);
            const [search, setSearch] = useState('');
            const [typeFilter, setTypeFilter] = useState('todos');
            const [selected, setSelected] = useState(null);
            const [evoChain, setEvoChain] = useState([]);

            useEffect(() => {
                const fetchInitial = async () => {
                    const res = await fetch('https://pokeapi.co/api/v2/pokemon?limit=1025');
                    const data = await res.json();
                    const list = data.results.map((p, i) => ({
                        name: p.name,
                        id: i + 1,
                        img: `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${i + 1}.png`
                    }));
                    setAllPokemon(list);
                    setLoading(false);
                    loadTypesInBackground(list);
                };
                fetchInitial();
            }, []);

            const loadTypesInBackground = async (list) => {
                for (let i = 0; i < list.length; i += 50) {
                    const batch = list.slice(i, i + 50);
                    const details = await Promise.all(batch.map(async p => {
                        const r = await fetch(`https://pokeapi.co/api/v2/pokemon/${p.id}`);
                        const d = await r.json();
                        return { ...p, types: d.types.map(t => t.type.name) };
                    }));
                    setAllPokemon(prev => {
                        const copy = [...prev];
                        details.forEach(d => { copy[d.id - 1] = d; });
                        return copy;
                    });
                }
            };

            const loadDetails = async (idOrName) => {
                const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${idOrName}`);
                const data = await res.json();
                const sRes = await fetch(data.species.url);
                const sData = await sRes.json();
                
                const eRes = await fetch(sData.evolution_chain.url);
                const eData = await eRes.json();

                let chain = [];
                let curr = eData.chain;

                while (curr) {
                    const name = curr.species.name;
                    const speciesRes = await fetch(`https://pokeapi.co/api/v2/pokemon-species/${name}`);
                    const speciesData = await speciesRes.json();
                    
                    // Busca todas as variedades (Mega, Gmax, Formas) de cada estagio
                    const varieties = await Promise.all(speciesData.varieties.map(async v => {
                        const vRes = await fetch(v.pokemon.url);
                        const vData = await vRes.json();
                        return {
                            name: v.pokemon.name,
                            img: vData.sprites.other['official-artwork'].front_default || vData.sprites.front_default,
                            isDefault: v.is_default
                        };
                    }));

                    chain.push({ name, varieties });
                    curr = curr.evolves_to[0];
                }

                setEvoChain(chain);
                setSelected({
                    ...data,
                    desc: sData.flavor_text_entries.find(l => l.language.name === 'en')?.flavor_text.replace(/[\n\f]/g, ' '),
                    gen: sData.generation.name.toUpperCase()
                });
            };

            const filtered = useMemo(() => {
                return allPokemon.filter(p => {
                    const matchesSearch = p.name.includes(search.toLowerCase()) || p.id.toString() === search;
                    const matchesType = typeFilter === 'todos' || (p.types && p.types.includes(typeFilter));
                    return matchesSearch && matchesType;
                });
            }, [search, typeFilter, allPokemon]);

            return (
                <div className="min-h-screen pb-10">
                    <header className="sticky top-0 z-50 bg-slate-950/90 border-b border-slate-800 p-4 md:p-6 backdrop-blur-md">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row gap-4 items-center">
                            <h1 className="text-2xl font-kanit font-bold text-yellow-400 shrink-0">POKEDEX PRO</h1>
                            <div className="flex w-full gap-2">
                                <input 
                                    type="text" 
                                    placeholder="Buscar..."
                                    className="flex-1 bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm outline-none focus:border-yellow-400"
                                    onChange={e => setSearch(e.target.value)}
                                />
                                <select 
                                    className="bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm outline-none"
                                    onChange={e => setTypeFilter(e.target.value)}
                                >
                                    <option value="todos">Tipos</option>
                                    {Object.keys(TRANSLATIONS.types).map(k => <option key={k} value={k}>{TRANSLATIONS.types[k]}</option>)}
                                </select>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto p-3 grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 xl:grid-cols-8 gap-3 md:gap-4">
                        {filtered.map(p => (
                            <div 
                                key={p.id} 
                                onClick={() => loadDetails(p.id)}
                                className="pokemon-card bg-slate-900 border border-slate-800 rounded-2xl p-3 flex flex-col items-center cursor-pointer"
                            >
                                <span className="w-full text-[10px] font-bold text-slate-600">#{p.id}</span>
                                <img src={p.img} className="w-24 h-24 md:w-32 md:h-32 object-contain my-2" loading="lazy" />
                                <h2 className="text-xs md:text-sm font-kanit font-bold capitalize truncate w-full text-center">{p.name}</h2>
                                <div className="flex gap-1 mt-2">
                                    {p.types?.map(t => (
                                        <div key={t} className={`w-2 h-2 rounded-full ${COLORS[t]}`} title={TRANSLATIONS.types[t]}></div>
                                    ))}
                                </div>
                            </div>
                        ))}
                    </main>

                    {selected && (
                        <div className="fixed inset-0 modal-overlay flex items-end md:items-center justify-center z-[100]" onClick={() => setSelected(null)}>
                            <div 
                                className="bg-slate-950 w-full max-w-4xl max-h-[95vh] md:rounded-[40px] rounded-t-[30px] overflow-y-auto border-t md:border border-slate-800 shadow-2xl"
                                onClick={e => e.stopPropagation()}
                            >
                                <div className="sticky top-0 bg-slate-950/90 p-4 border-b border-slate-800 flex justify-between items-center z-10 backdrop-blur-md">
                                    <button onClick={() => setSelected(null)} className="text-yellow-400 font-bold text-sm uppercase tracking-widest">← Fechar</button>
                                    <span className="text-[10px] font-bold text-slate-500">{selected.gen}</span>
                                </div>

                                <div className="p-5 md:p-10 flex flex-col md:flex-row gap-8">
                                    <div className="w-full md:w-1/3 text-center">
                                        <img src={selected.sprites.other['official-artwork'].front_default} className="w-48 h-48 md:w-full mx-auto drop-shadow-2xl" />
                                        <h2 className="text-4xl font-kanit font-bold capitalize mt-4">{selected.name}</h2>
                                        <div className="flex justify-center gap-2 mt-4">
                                            {selected.types.map(t => (
                                                <span key={t.type.name} className={`${COLORS[t.type.name]} px-4 py-1 rounded-full text-[10px] font-bold uppercase`}>
                                                    {TRANSLATIONS.types[t.type.name]}
                                                </span>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="flex-1">
                                        <p className="text-slate-400 text-sm italic mb-8">"{selected.desc}"</p>
                                        
                                        <h3 className="text-yellow-400 font-kanit font-bold text-xs tracking-[0.2em] mb-4 uppercase">Estatisticas</h3>
                                        <div className="grid grid-cols-2 gap-4 mb-10">
                                            {selected.stats.map(s => (
                                                <div key={s.stat.name}>
                                                    <div className="flex justify-between text-[10px] font-bold uppercase mb-1">
                                                        <span className="text-slate-500">{TRANSLATIONS.stats[s.stat.name] || s.stat.name}</span>
                                                        <span>{s.base_stat}</span>
                                                    </div>
                                                    <div className="h-1.5 bg-slate-800 rounded-full overflow-hidden">
                                                        <div className={`stat-fill ${COLORS[selected.types[0].type.name]}`} style={{ width: `${(s.base_stat / 255) * 100}%` }}></div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>

                                        <h3 className="text-yellow-400 font-kanit font-bold text-xs tracking-[0.2em] mb-6 uppercase">Linha Evolutiva & Formas</h3>
                                        <div className="space-y-8">
                                            {evoChain.map((step, i) => (
                                                <div key={step.name} className="flex flex-col items-center">
                                                    <div className="w-full flex items-center gap-4 overflow-x-auto pb-2 hide-scroll">
                                                        {step.varieties.map(v => (
                                                            <div 
                                                                key={v.name} 
                                                                onClick={() => loadDetails(v.name)}
                                                                className={`shrink-0 text-center p-2 rounded-2xl border ${v.name === selected.name ? 'border-yellow-400 bg-yellow-400/5' : 'border-slate-800'} cursor-pointer`}
                                                            >
                                                                <img src={v.img} className="w-16 h-16 mx-auto" />
                                                                <p className="text-[9px] font-bold capitalize mt-1 text-slate-400 max-w-[80px] truncate">{v.name.replace(/-/g, ' ')}</p>
                                                            </div>
                                                        ))}
                                                    </div>
                                                    {i < evoChain.length - 1 && <div className="text-slate-800 my-2 text-xl font-black italic">↓</div>}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MasterDex</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root{
--type-color:#4A90E2;
--type-dark:#1a1a2e;
--glass-bg:rgba(255,255,255,0.5);
--glass-border:rgba(255,255,255,0.7);
--text-main:#1a1a1a;
--header-bg:rgba(255,255,255,0.15);
--card-inner:rgba(255,255,255,0.3);
}

[data-theme="dark"]{
--glass-bg:rgba(30,30,45,0.7);
--glass-border:rgba(255,255,255,0.1);
--text-main:#fff;
--header-bg:rgba(0,0,0,0.3);
--card-inner:rgba(255,255,255,0.08);
}

body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,var(--type-color),var(--type-dark));
color:var(--text-main);
overflow-x:hidden;
}

/* HEADER */
header{
position:fixed;
top:0;
width:100%;
padding:25px;
text-align:center;
background:var(--header-bg);
backdrop-filter:blur(15px);
transition:.4s;
z-index:100;
}
header.hide{transform:translateY(-100%);}

h1{
font-family:'Montserrat';
color:#fff;
margin:0 0 10px;
}

/* GRID */
#pokedex-grid{
padding:180px 15px 50px;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(155px,1fr));
gap:15px;
}

.grid-card{
background:var(--glass-bg);
backdrop-filter:blur(10px);
border-radius:20px;
padding:15px;
text-align:center;
cursor:pointer;
transition:.3s;
}
.grid-card:hover{transform:translateY(-5px);}

.grid-id{font-size:11px;opacity:.5;}
.grid-name{font-weight:800;text-transform:capitalize;}
.grid-rarity{font-size:10px;font-weight:800;}

/* MODAL */
#modal-overlay{
position:fixed;
inset:0;
display:none;
background:rgba(0,0,0,.6);
backdrop-filter:blur(15px);
justify-content:center;
padding:20px;
z-index:3000;
}
#modal-overlay.active{display:flex;}

#modal-content{
position:relative;
width:100%;
max-width:820px;
padding:35px;
border-radius:40px;

background:rgba(255,255,255,0.08);
backdrop-filter:blur(50px) saturate(180%);
-webkit-backdrop-filter:blur(50px) saturate(180%);

border:1px solid rgba(255,255,255,0.2);

box-shadow:
inset 0 2px 6px rgba(255,255,255,0.3),
0 30px 80px rgba(0,0,0,0.5);

overflow:hidden;
}

#modal-content::before{
content:"";
position:absolute;
inset:0;
background:linear-gradient(120deg,rgba(255,255,255,.25),transparent 60%);
pointer-events:none;
}

.modal-layout{
display:flex;
flex-direction:column;
align-items:center;
gap:30px;
}

@media(min-width:800px){
.modal-layout{
flex-direction:row;
align-items:flex-start;
}
}

/* IMAGEM */
#poke-image{
width:clamp(180px,40vw,280px);
}

/* TEXTO */
#poke-name{
font-family:'Montserrat';
font-size:32px;
margin-bottom:10px;
}

#poke-desc{
background:var(--card-inner);
padding:22px;
border-radius:15px;
line-height:1.6;
margin:10px 0;
}

/* INFO GRID */
.info-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
margin-top:15px;
}

@media(max-width:500px){
.info-grid{grid-template-columns:1fr;}
}

.info-item{
background:var(--card-inner);
padding:12px;
border-radius:12px;
display:flex;
justify-content:space-between;
}

/* BOTÃO */
.close-btn{
position:absolute;
top:15px;
right:20px;
font-size:22px;
cursor:pointer;
}

</style>
</head>

<body>

<header id="main-header">
<h1>MASTERDEX</h1>
</header>

<div id="pokedex-grid"></div>

<div id="modal-overlay">
<div id="modal-content">
<div class="close-btn" onclick="closeModal()">×</div>

<div class="modal-layout">
<img id="poke-image">

<div style="flex:1">
<div id="poke-name"></div>
<div id="poke-desc"></div>

<div class="info-grid">
<div class="info-item"><span>Altura</span><span id="poke-height"></span></div>
<div class="info-item"><span>Peso</span><span id="poke-weight"></span></div>
<div class="info-item"><span>Raridade</span><span id="poke-rarity"></span></div>
</div>
</div>
</div>

</div>
</div>

<script>
let allPokemon=[];
let lastScroll=0;

async function init(){
const res=await fetch('https://pokeapi.co/api/v2/pokemon?limit=300');
const data=await res.json();

allPokemon=data.results.map(p=>{
let id=p.url.split('/').filter(Boolean).pop();
return{name:p.name,id};
});

render(allPokemon);
}

function render(list){
const grid=document.getElementById('pokedex-grid');
grid.innerHTML="";

list.forEach(p=>{
grid.innerHTML+=`
<div class="grid-card" onclick="openModal(${p.id})">
<img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${p.id}.png">
<div class="grid-id">#${p.id}</div>
<div class="grid-name">${p.name}</div>
</div>`;
});
}

async function openModal(id){
const overlay=document.getElementById('modal-overlay');
overlay.classList.add('active');

const p=await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`).then(r=>r.json());
const s=await fetch(p.species.url).then(r=>r.json());

document.getElementById('poke-image').src=p.sprites.other['official-artwork'].front_default;
document.getElementById('poke-name').innerText=p.name;

document.getElementById('poke-height').innerText=(p.height/10)+' m';
document.getElementById('poke-weight').innerText=(p.weight/10)+' kg';

const rarity=s.is_legendary?'Lendário':(s.is_mythical?'Mítico':'Comum');
document.getElementById('poke-rarity').innerText=rarity;

const desc=s.flavor_text_entries.find(f=>f.language.name==='en');
document.getElementById('poke-desc').innerText=desc.flavor_text;
}

function closeModal(){
document.getElementById('modal-overlay').classList.remove('active');
}

window.addEventListener('scroll',()=>{
const header=document.getElementById('main-header');
const current=window.pageYOffset;

if(current>lastScroll){
header.classList.add('hide');
}else{
header.classList.remove('hide');
}

lastScroll=current;
});

init();
</script>

</body>
</html>

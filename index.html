<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokedex Pro - Ultimate Eduardo</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;700&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        kanit: ['Kanit', 'sans-serif'],
                        montserrat: ['Montserrat', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        * { transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease; }
        body { font-family: 'Montserrat', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        .pokedex-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
            gap: 12px;
            width: 100%;
        }
        @media (min-width: 1024px) {
            .pokedex-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        }

        .modal-overlay { backdrop-filter: blur(15px); z-index: 100; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .stat-bar { height: 7px; border-radius: 4px; overflow: hidden; }
        .stat-fill { height: 100%; transition: width 1s ease-out; }
        
        .tag-rare { font-size: 8px; font-weight: 800; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; }
        .legendary { background: #facc15; color: #000; box-shadow: 0 0 8px rgba(250, 204, 21, 0.4); }
        .mythical { background: #a855f7; color: #fff; box-shadow: 0 0 8px rgba(168, 85, 247, 0.4); }
        
        .var-badge { font-size: 7px; font-weight: 900; padding: 1px 4px; border-radius: 3px; position: absolute; bottom: 4px; right: 4px; }
    </style>
</head>
<body class="bg-slate-100 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const TRANSLATIONS = {
            types: {
                fire: 'Fogo', water: 'Agua', grass: 'Planta', bug: 'Inseto', normal: 'Normal', 
                poison: 'Venenoso', electric: 'Eletrico', ground: 'Terra', fairy: 'Fada', 
                fighting: 'Lutador', psychic: 'Psiquico', rock: 'Pedra', ghost: 'Fantasma', 
                ice: 'Gelo', dragon: 'Dragao', steel: 'Aco', flying: 'Voador', dark: 'Sombrio'
            },
            stats: {
                hp: 'Vida', attack: 'Atk', defense: 'Def', 
                'special-attack': 'Atk Esp', 'special-defense': 'Def Esp', speed: 'Veloc'
            }
        };

        const COLORS = {
            fire: 'bg-red-500', water: 'bg-blue-500', grass: 'bg-green-500', bug: 'bg-lime-600', 
            normal: 'bg-slate-400', poison: 'bg-purple-500', electric: 'bg-yellow-400', ground: 'bg-amber-600', 
            fairy: 'bg-pink-400', fighting: 'bg-orange-700', psychic: 'bg-rose-400', rock: 'bg-stone-600', 
            ghost: 'bg-indigo-800', ice: 'bg-cyan-300', dragon: 'bg-violet-600', steel: 'bg-gray-500', 
            flying: 'bg-sky-400', dark: 'bg-slate-900'
        };

        const GENERATIONS = {
            'gen1': { name: 'Gen 1', range: [1, 151] },
            'gen2': { name: 'Gen 2', range: [152, 251] },
            'gen3': { name: 'Gen 3', range: [252, 386] },
            'gen4': { name: 'Gen 4', range: [387, 493] },
            'gen5': { name: 'Gen 5', range: [494, 649] },
            'gen6': { name: 'Gen 6', range: [650, 721] },
            'gen7': { name: 'Gen 7', range: [722, 809] },
            'gen8': { name: 'Gen 8', range: [810, 905] },
            'gen9': { name: 'Gen 9', range: [906, 1025] }
        };

        function App() {
            // TEMA PADRAO: CLARO
            const [theme, setTheme] = useState('light');
            const [pokemonList, setPokemonList] = useState([]);
            const [loading, setLoading] = useState(true);
            const [search, setSearch] = useState('');
            const [typeF, setTypeF] = useState('todos');
            const [genF, setGenF] = useState('todos');
            const [rareF, setRareF] = useState('todos');
            const [selected, setSelected] = useState(null);
            const [evoChain, setEvoChain] = useState([]);

            useEffect(() => {
                document.documentElement.className = theme;
            }, [theme]);

            useEffect(() => {
                const fetchInit = async () => {
                    const res = await fetch('https://pokeapi.co/api/v2/pokemon?limit=1025');
                    const data = await res.json();
                    const list = data.results.map((p, i) => ({
                        name: p.name,
                        id: i + 1,
                        img: `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${i + 1}.png`
                    }));
                    setPokemonList(list);
                    setLoading(false);
                    loadBackgroundData(list);
                };
                fetchInit();
            }, []);

            const loadBackgroundData = async (list) => {
                for (let i = 0; i < list.length; i += 50) {
                    const batch = list.slice(i, i + 50);
                    const details = await Promise.all(batch.map(async p => {
                        try {
                            const r = await fetch(`https://pokeapi.co/api/v2/pokemon/${p.id}`);
                            const d = await r.json();
                            const sr = await fetch(d.species.url);
                            const sd = await sr.json();
                            return { 
                                ...p, 
                                types: d.types.map(t => t.type.name),
                                rarity: sd.is_mythical ? 'mitico' : sd.is_legendary ? 'lendario' : 'comum'
                            };
                        } catch { return p; }
                    }));
                    setPokemonList(prev => {
                        const copy = [...prev];
                        details.forEach(d => {
                            const idx = copy.findIndex(item => item.id === d.id);
                            if (idx !== -1) copy[idx] = d;
                        });
                        return copy;
                    });
                }
            };

            const loadDetails = async (idOrName) => {
                const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${idOrName}`);
                const data = await res.json();
                const sRes = await fetch(data.species.url);
                const sData = await sRes.json();
                const eRes = await fetch(sData.evolution_chain.url);
                const eData = await eRes.json();

                let chain = [];
                let curr = eData.chain;
                while (curr) {
                    const name = curr.species.name;
                    const spRes = await fetch(`https://pokeapi.co/api/v2/pokemon-species/${name}`);
                    const spData = await spRes.json();
                    const varieties = await Promise.all(spData.varieties.map(async v => {
                        const vR = await fetch(v.pokemon.url);
                        const vD = await vR.json();
                        return { 
                            name: v.pokemon.name, 
                            id: vD.id, 
                            img: vD.sprites.other['official-artwork'].front_default || vD.sprites.front_default 
                        };
                    }));
                    chain.push({ name, varieties });
                    curr = curr.evolves_to[0];
                }
                setEvoChain(chain);
                setSelected({
                    ...data,
                    rarity: sData.is_mythical ? 'mitico' : sData.is_legendary ? 'lendario' : 'comum',
                    desc: sData.flavor_text_entries.find(l => l.language.name === 'en')?.flavor_text.replace(/[\n\f]/g, ' ')
                });
            };

            const filtered = useMemo(() => {
                return pokemonList.filter(p => {
                    const mSearch = p.name.includes(search.toLowerCase()) || p.id.toString() === search;
                    const mType = typeF === 'todos' || (p.types && p.types.includes(typeF));
                    const mRare = rareF === 'todos' || (p.rarity === rareF);
                    let mGen = true;
                    if (genF !== 'todos') {
                        const r = GENERATIONS[genF].range;
                        mGen = p.id >= r[0] && p.id <= r[1];
                    }
                    return mSearch && mType && mRare && mGen;
                });
            }, [search, typeF, genF, rareF, pokemonList]);

            return (
                <div className={`min-h-screen ${theme === 'dark' ? 'bg-slate-950 text-white' : 'bg-slate-100 text-slate-900'}`}>
                    {/* Header com Toggle e Filtros */}
                    <header className={`sticky top-0 z-50 border-b p-4 md:p-6 backdrop-blur-md ${theme === 'dark' ? 'bg-slate-950/90 border-slate-800' : 'bg-white/90 border-slate-200'}`}>
                        <div className="max-w-[1700px] mx-auto">
                            <div className="flex justify-between items-center mb-6">
                                <h1 className="text-2xl font-kanit font-bold tracking-tighter">POKEDEX<span className="text-yellow-400">PRO</span></h1>
                                <button 
                                    onClick={() => setTheme(theme === 'dark' ? 'light' : 'dark')}
                                    className={`px-5 py-2.5 rounded-2xl font-bold text-[10px] uppercase tracking-widest shadow-lg ${theme === 'dark' ? 'bg-white text-black' : 'bg-slate-900 text-white'}`}
                                >
                                    {theme === 'dark' ? '☀️ MODO CLARO' : '🌙 MODO ESCURO'}
                                </button>
                            </div>
                            
                            <div className="flex flex-wrap gap-2 md:gap-3">
                                <input 
                                    type="text" 
                                    placeholder="Nome ou ID..."
                                    className={`flex-1 min-w-[180px] p-3.5 rounded-2xl text-sm outline-none border focus:ring-2 ring-yellow-400 ${theme === 'dark' ? 'bg-slate-900 border-slate-700' : 'bg-white border-slate-200 shadow-sm'}`}
                                    onChange={e => setSearch(e.target.value)}
                                />
                                <select className={`p-3.5 rounded-2xl text-xs font-bold border outline-none ${theme === 'dark' ? 'bg-slate-900 border-slate-700' : 'bg-white border-slate-200 shadow-sm'}`} onChange={e => setTypeF(e.target.value)}>
                                    <option value="todos">Todos Tipos</option>
                                    {Object.keys(TRANSLATIONS.types).map(k => <option key={k} value={k}>{TRANSLATIONS.types[k]}</option>)}
                                </select>
                                <select className={`p-3.5 rounded-2xl text-xs font-bold border outline-none ${theme === 'dark' ? 'bg-slate-900 border-slate-700' : 'bg-white border-slate-200 shadow-sm'}`} onChange={e => setGenF(e.target.value)}>
                                    <option value="todos">Geracoes</option>
                                    {Object.keys(GENERATIONS).map(k => <option key={k} value={k}>{GENERATIONS[k].name}</option>)}
                                </select>
                                <select className={`p-3.5 rounded-2xl text-xs font-bold border outline-none text-yellow-500 ${theme === 'dark' ? 'bg-slate-900 border-slate-700' : 'bg-white border-slate-200 shadow-sm'}`} onChange={e => setRareF(e.target.value)}>
                                    <option value="todos">Raridades</option>
                                    <option value="comum">Comum</option>
                                    <option value="lendario">Lendario</option>
                                    <option value="mitico">Mitico</option>
                                </select>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-[1700px] mx-auto p-4 md:p-8">
                        <div className="pokedex-grid">
                            {filtered.map(p => (
                                <div key={p.id} onClick={() => loadDetails(p.id)} className={`rounded-[32px] p-5 cursor-pointer border flex flex-col items-center hover:-translate-y-2 transition-all ${theme === 'dark' ? 'bg-slate-900 border-slate-800' : 'bg-white border-slate-100 shadow-md'}`}>
                                    <div className="w-full flex justify-between items-start mb-2">
                                        <span className="text-[10px] font-bold text-slate-400">#{p.id}</span>
                                        {p.rarity && p.rarity !== 'comum' && <span className={`tag-rare ${p.rarity === 'lendario' ? 'legendary' : 'mythical'}`}>{p.rarity}</span>}
                                    </div>
                                    <img src={p.img} className="w-28 h-28 md:w-36 md:h-36 object-contain my-2 drop-shadow-2xl" loading="lazy" />
                                    <h2 className={`text-sm md:text-base font-kanit font-bold capitalize mt-3 ${theme === 'dark' ? 'text-white' : 'text-slate-900'}`}>{p.name}</h2>
                                    <div className="flex flex-wrap justify-center gap-1.5 mt-4">
                                        {p.types?.map(t => <span key={t} className={`${COLORS[t]} px-2.5 py-1 rounded-lg text-[8px] font-bold uppercase text-white shadow-sm`}>{TRANSLATIONS.types[t]}</span>)}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>

                    {selected && (
                        <div className="fixed inset-0 modal-overlay flex items-end md:items-center justify-center p-0 md:p-4" onClick={() => setSelected(null)}>
                            <div className={`w-full max-w-5xl max-h-[92vh] md:rounded-[48px] rounded-t-[40px] overflow-y-auto border shadow-2xl relative ${theme === 'dark' ? 'bg-slate-950 border-slate-800' : 'bg-white border-slate-200'}`} onClick={e => e.stopPropagation()}>
                                <div className={`sticky top-0 p-5 border-b flex justify-between items-center z-50 backdrop-blur-md ${theme === 'dark' ? 'bg-slate-950/90 border-slate-800' : 'bg-white/90 border-slate-200'}`}>
                                    <button onClick={() => setSelected(null)} className="text-yellow-500 font-bold text-xs uppercase tracking-widest">← Voltar</button>
                                    <span className={`tag-rare ${selected.rarity === 'lendario' ? 'legendary' : selected.rarity === 'mitico' ? 'mythical' : 'bg-slate-200 text-slate-600'}`}>{selected.rarity}</span>
                                </div>

                                <div className="p-6 md:p-12 flex flex-col md:flex-row gap-12">
                                    <div className="w-full md:w-1/3 text-center">
                                        <div className={`rounded-[40px] p-8 mb-6 border ${theme === 'dark' ? 'bg-slate-900 border-slate-800' : 'bg-slate-50 border-slate-100'}`}>
                                            <img src={selected.sprites.other['official-artwork'].front_default} className="w-52 h-52 md:w-full mx-auto drop-shadow-2xl" />
                                        </div>
                                        <h2 className="text-4xl font-kanit font-bold capitalize mb-4">{selected.name}</h2>
                                        <div className="flex justify-center gap-2 mb-6">
                                            {selected.types.map(t => <span key={t.type.name} className={`${COLORS[t.type.name]} px-5 py-1.5 rounded-xl text-[10px] font-bold uppercase text-white shadow-xl`}>{TRANSLATIONS.types[t.type.name]}</span>)}
                                        </div>
                                    </div>

                                    <div className="flex-1">
                                        <p className={`text-sm italic mb-10 border-l-4 pl-4 leading-relaxed ${theme === 'dark' ? 'text-slate-400 border-slate-700' : 'text-slate-600 border-slate-200'}`}>"{selected.desc}"</p>
                                        
                                        <h3 className="text-yellow-500 font-kanit font-bold text-[10px] tracking-widest mb-6 uppercase">Estatisticas</h3>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-x-10 gap-y-5 mb-12">
                                            {selected.stats.map(s => (
                                                <div key={s.stat.name}>
                                                    <div className="flex justify-between text-[10px] font-bold uppercase mb-1.5">
                                                        <span className="text-slate-500">{TRANSLATIONS.stats[s.stat.name] || s.stat.name}</span>
                                                        <span>{s.base_stat}</span>
                                                    </div>
                                                    <div className={`h-1.5 rounded-full overflow-hidden ${theme === 'dark' ? 'bg-slate-800' : 'bg-slate-200'}`}>
                                                        <div className={`stat-fill ${COLORS[selected.types[0].type.name]}`} style={{ width: `${(s.base_stat / 255) * 100}%` }}></div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>

                                        <h3 className="text-yellow-500 font-kanit font-bold text-[10px] tracking-widest mb-8 uppercase">Linha Evolutiva & Variacoes</h3>
                                        <div className="space-y-10">
                                            {evoChain.map((step, i) => (
                                                <div key={step.name} className="flex flex-col gap-4">
                                                    <div className="flex items-center gap-3">
                                                        <span className="text-[9px] font-bold text-slate-500 uppercase">Estagio {i + 1}</span>
                                                        <div className={`h-px flex-1 ${theme === 'dark' ? 'bg-slate-800' : 'bg-slate-100'}`}></div>
                                                    </div>
                                                    <div className="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 gap-4">
                                                        {step.varieties.map(v => {
                                                            // LOGICA DE TAGS NAS VARIACOES
                                                            let badge = "";
                                                            if(v.name.includes("-mega")) badge = "MEGA";
                                                            if(v.name.includes("-gmax")) badge = "G-MAX";
                                                            if(v.name.includes("-alola")) badge = "ALOLA";
                                                            if(v.name.includes("-galar")) badge = "GALAR";
                                                            if(v.name.includes("-hisui")) badge = "HISUI";
                                                            if(v.name.includes("-paldea")) badge = "PALDEA";

                                                            return (
                                                                <div key={v.id} onClick={() => loadDetails(v.id)} className={`cursor-pointer group relative p-3 rounded-2xl border transition-all ${v.id === selected.id ? 'border-yellow-400 bg-yellow-400/5' : theme === 'dark' ? 'border-slate-800 bg-slate-900/50 hover:border-slate-600' : 'border-slate-100 bg-slate-50 hover:border-slate-200'}`}>
                                                                    <img src={v.img} className="w-14 h-14 mx-auto group-hover:scale-110 transition-transform" />
                                                                    <p className="text-[8px] font-bold capitalize mt-3 text-center text-slate-500 truncate">{v.name.replace(/-/g, ' ')}</p>
                                                                    {badge && (
                                                                        <span className={`var-badge ${badge === 'G-MAX' ? 'bg-red-500' : badge === 'MEGA' ? 'bg-blue-500' : 'bg-slate-700'} text-white`}>
                                                                            {badge}
                                                                        </span>
                                                                    )}
                                                                </div>
                                                            );
                                                        })}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
